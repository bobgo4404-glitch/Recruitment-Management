        window.fbServices = {
            ready: false,
            db: null,

                const path = ['artifacts', appId, 'public', 'data', 'recruit_jobs'];
                return collection(window.fbServices.db, ...path);
            },
            api: { setDoc, deleteDoc, doc, onSnapshot, onAuthStateChanged, collection, runTransaction }
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            
            window.fbServices.db = db;
            window.fbServices.auth = auth;

            const initAuth = async () => {
                try {
                    let signedIn = false;
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            await signInWithCustomToken(auth, __initial_auth_token);
                            signedIn = true;
                        } catch (e) {
                            console.warn("Custom token auth failed.", e);
                        }
                    }
                    if (!signedIn) {
                        await signInAnonymously(auth);
                    }
                    window.fbServices.ready = true;
                    window.dispatchEvent(new Event('firebase-ready'));
                    console.log("Firebase Connected Successfully. App ID:", appId);
                } catch (e) {
                    console.error("Auth Failed", e);
                    window.fbServices.ready = true;
                    window.dispatchEvent(new Event('firebase-ready'));

        const STAGES = ['접수', '서류검토', '1차면접', '2차면접', '최종합격', '불합격'];

        const DEFAULT_TEMPLATE_SETTINGS = {
            companyName: '채용 담당자',
            introLine: '면접 가능 시간 안내드립니다.',
            actionLine: '가능한 시간을 선택해주세요.',

            previewCandidateName: '홍길동',

                '',

                '{{actionLine}}',
                '{{bookingUrl}}',
                '',
                '{{footerLine}}'

            draft: '초안',
            ready: '발송준비',
            sent: '링크발송',
            responded: '지원자응답',
            confirmed: '일정확정'
        };
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const generateToken = () => `${generateId()}${generateId()}`;
        const createInterviewSlot = (datetime = '') => ({ id: generateId(), datetime });
        const normalizeInterviewSlots = (slots = []) => {
            const normalized = Array.isArray(slots)
                ? slots.slice(0, 3).map((slot) => ({
                    id: slot?.id || generateId(),
                    datetime: slot?.datetime || ''
                }))
                : [];
            while (normalized.length < 3) normalized.push(createInterviewSlot());
            return normalized;
        };
        const getScheduleRequestStatus = (candidate) => candidate?.scheduleRequest?.status || 'draft';
        const getBookingBaseUrl = () => {
            if (typeof window === 'undefined') return 'https://your-domain.example/recruit-booking.html';
            const { origin, pathname, protocol } = window.location;
            if (protocol === 'http:' || protocol === 'https:') return `${origin}${pathname}`;
            return 'https://your-domain.example/recruit-booking.html';
        };
        const getNotificationEndpoint = () => {
            if (typeof window === 'undefined') return '';
            return window.RECRUIT_NOTI_CONFIG?.notificationEndpoint || '';
        };
        const buildBookingUrl = ({ jobId, candidateId, token }) => {
            if (!jobId || !candidateId || !token) return '';
            const baseUrl = getBookingBaseUrl();
            const url = new URL(baseUrl);
            url.searchParams.set('mode', 'booking');
            url.searchParams.set('jobId', jobId);
            url.searchParams.set('candidateId', candidateId);
            url.searchParams.set('token', token);
            return url.toString();
        };
        const formatCandidateAddedAt = (candidate) => {
            if (!candidate) return '-';
            if (candidate.addedAt) return candidate.addedAt;
            if (candidate.addedAtIso) return new Date(candidate.addedAtIso).toLocaleDateString('ko-KR');
            return '-';
        };
        const formatDateTimeLabel = (value) => {
            if (!value) return '-';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return value;
            return d.toLocaleString('ko-KR', {
                year: 'numeric',
                month: 'numeric',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        };
        const getSelectedSlot = (candidate) => {
            const slots = candidate?.scheduleRequest?.slots || [];
            const selectedSlotId = candidate?.scheduleRequest?.selectedSlotId;
            return slots.find((slot) => slot.id === selectedSlotId) || null;
        };
        const loadTemplateSettings = () => {
            try {
                const raw = localStorage.getItem(TEMPLATE_SETTINGS_KEY);
                if (!raw) return { ...DEFAULT_TEMPLATE_SETTINGS };
                const parsed = JSON.parse(raw);
                return { ...DEFAULT_TEMPLATE_SETTINGS, ...(parsed || {}) };
            } catch (error) {
                return { ...DEFAULT_TEMPLATE_SETTINGS };
            }
        };
        const renderMessageTemplate = (template, variables) => String(template || '')
            .replace(/\{\{\s*([a-zA-Z0-9_]+)\s*\}\}/g, (_, key) => variables[key] == null ? '' : String(variables[key]));
        const buildInterviewRequestMessage = ({ candidateName, companyName, jobTitle, slots, bookingUrl, templateSettings }) => {
            const settings = { ...DEFAULT_TEMPLATE_SETTINGS, ...(templateSettings || {}) };
            const slotLines = (slots || [])
                .filter((slot) => slot.datetime)
                .map((slot, index) => `${index + 1}. ${formatDateTimeLabel(slot.datetime)}`)
                .join('\n');
            const variables = {
                candidateName: candidateName || '지원자',
                companyName: companyName || settings.companyName || '채용 담당자',
                jobTitle: jobTitle || '',
                jobTitleBracket: jobTitle ? `[${jobTitle}]` : '',
                introLine: settings.introLine || '',
                slotLines,
                actionLine: settings.actionLine || '',
                bookingUrl: bookingUrl || '',
                footerLine: settings.footerLine || ''
            };
            return renderMessageTemplate(settings.templateBody, variables).trim();
        };
        
        const getDday = (endDate) => {
            const today = new Date();
            const end = new Date(endDate);
            today.setHours(0,0,0,0);
            end.setHours(0,0,0,0);
            const diffTime = end - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays < 0) return '마감';
            if (diffDays === 0) return '오늘마감';
            return `D-${diffDays}`;
        };

        const isExpired = (endDate) => {
            const today = new Date();
            const end = new Date(endDate);
            today.setHours(0,0,0,0);
            end.setHours(0,0,0,0);
            return end < today;
        };
        const normalizePhone = (raw) => (raw || '').replace(/[^0-9]/g, '');
        const toDateOnly = (value) => {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '';
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        };
        const csvEscape = (value) => {
            const v = String(value ?? '');
            if (/[",\n]/.test(v)) return `"${v.replace(/"/g, '""')}"`;
            return v;
        };
        const escapeHtml = (value) => String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const Modal = ({ isOpen, onClose, title, children, size = 'md' }) => {
            if (!isOpen) return null;
            const sizeClass = size === 'lg' ? 'max-w-3xl' : 'max-w-lg';
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
                    <div className={`bg-white rounded-2xl shadow-2xl w-full ${sizeClass} overflow-hidden flex flex-col max-h-[90vh]`}>
                        <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                            <h3 className="font-bold text-lg text-gray-800">{title}</h3>
                            <button onClick={onClose} className="p-1 hover:bg-gray-200 rounded-full transition-colors"><Icons.X className="w-5 h-5 text-gray-500" /></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar">{children}</div>
                    </div>
                </div>
            );
        };
        const Badge = ({ children, colorClass }) => (<span className={`px-2 py-0.5 rounded text-xs font-semibold border ${colorClass}`}>{children}</span>);
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error('ErrorBoundary caught an error:', error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6">
                            <div className="max-w-lg w-full bg-white border border-red-100 rounded-2xl shadow-xl p-6">
                                <h2 className="text-xl font-bold text-red-600 mb-2">시스템 오류 발생</h2>
                                <p className="text-sm text-slate-600 mb-4">앱 실행 중 예외가 발생했습니다. 새로고침 후 다시 시도해주세요.</p>
                                <div className="text-xs text-slate-500 bg-slate-50 border rounded p-3 mb-4 break-all">
                                    {this.state.error?.message || '알 수 없는 오류'}
                                </div>
                                <button
                                    onClick={() => window.location.reload()}
                                    className="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-lg font-semibold"
                                >
                                    새로고침
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const App = () => {
            const pageParams = new URLSearchParams(window.location.search);
            const isBookingMode = pageParams.get('mode') === 'booking';
            const [jobs, setJobs] = useState([]);
            const [fbReady, setFbReady] = useState(false);
            const [user, setUser] = useState(null);
            const [permissionError, setPermissionError] = useState(false);

            const [currentMenu, setCurrentMenu] = useState('dashboard'); 
            const [viewMode, setViewMode] = useState('list'); 
            const [activeJobId, setActiveJobId] = useState(null);
            
            const [isCreateOpen, setIsCreateOpen] = useState(false);
            const [isManualAddOpen, setIsManualAddOpen] = useState(false);
            const [isBulkUploadOpen, setIsBulkUploadOpen] = useState(false);
            const [bulkUploading, setBulkUploading] = useState(false);
            const [bulkUploadResult, setBulkUploadResult] = useState(null);
            const [editingJob, setEditingJob] = useState(null);
            const [isCandidateModalOpen, setIsCandidateModalOpen] = useState(false);
            const [selectedCandidate, setSelectedCandidate] = useState(null);
            const [templateSettings, setTemplateSettings] = useState(() => loadTemplateSettings());
            const [templateDraft, setTemplateDraft] = useState(() => loadTemplateSettings());
            const [scheduleDraft, setScheduleDraft] = useState(() => ({
                slots: normalizeInterviewSlots([]),
                status: 'draft',
                token: '',
                sentAt: '',
                respondedAt: '',
                confirmedAt: '',
                selectedSlotId: ''
            }));
            const [bookingActionBusy, setBookingActionBusy] = useState(false);

            useEffect(() => {
                const checkFirebase = () => {
                    if (window.fbServices && window.fbServices.ready) {
                        setFbReady(true);
                        const { onAuthStateChanged } = window.fbServices.api;
                        onAuthStateChanged(window.fbServices.auth, (u) => {
                           setUser(u);
                        });
                    }
                };
                if (window.fbServices && window.fbServices.ready) {
                    checkFirebase();
                } else {
                    window.addEventListener('firebase-ready', checkFirebase);
                }
                return () => window.removeEventListener('firebase-ready', checkFirebase);
            }, []);

            useEffect(() => {
                if (!user || !fbReady || !window.fbServices.db) return;
                const { onSnapshot } = window.fbServices.api;
                const colRef = window.fbServices.getCollectionPath(user.uid);
                
                const unsubscribe = onSnapshot(colRef, (snapshot) => {
                    const loadedJobs = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    setJobs(loadedJobs);
                    setPermissionError(false);
                }, (error) => {
                    if (error.code === 'permission-denied') setPermissionError(true);
                });
                return () => unsubscribe();
            }, [user, fbReady]);

            const firestoreWrite = async (jobId, data, isDelete = false) => {
                if (!user) return;
                const { setDoc, deleteDoc, doc } = window.fbServices.api;
                const colRef = window.fbServices.getCollectionPath(user.uid);
                const docRef = doc(colRef, jobId);
                try {
                    if (isDelete) await deleteDoc(docRef);
                    else await setDoc(docRef, data, { merge: true });
                } catch (e) {
                    if (e.code === 'permission-denied') alert("데이터 저장 권한 오류 (Test Mode 필요)");
                    else alert("저장 실패: " + e.message);
                }
            };
            const updateCandidatesAtomic = async (jobId, updater) => {
                if (!user || !jobId || typeof updater !== 'function') return null;
                const { runTransaction, doc } = window.fbServices.api;
                const colRef = window.fbServices.getCollectionPath(user.uid);
                const docRef = doc(colRef, jobId);
                try {
                    const updatedCandidates = await runTransaction(window.fbServices.db, async (tx) => {
                        const snap = await tx.get(docRef);
                        if (!snap.exists()) throw new Error('공고 문서를 찾을 수 없습니다.');
                        const jobData = snap.data() || {};
                        const currentCandidates = Array.isArray(jobData.candidates) ? jobData.candidates : [];
                        const nextCandidates = updater(currentCandidates);
                        tx.update(docRef, { candidates: nextCandidates });
                        return nextCandidates;
                    });
                    return updatedCandidates;
                } catch (e) {
                    console.error('지원자 동시 수정 실패:', e);
                    alert('지원자 업데이트 중 충돌이 발생했습니다. 다시 시도해주세요.');
                    return null;
                }
            };

            const activeJob = useMemo(() => jobs.find(j => j.id === activeJobId), [jobs, activeJobId]);
            const liveJobs = useMemo(() => jobs.filter(j => !j.deletedAt), [jobs]);
            const trashJobs = useMemo(() => jobs.filter(j => !!j.deletedAt), [jobs]);
            const activeJobs = useMemo(() => liveJobs.filter(j => j.period?.end && !isExpired(j.period.end)), [liveJobs]);
            const closedJobs = useMemo(() => liveJobs.filter(j => j.period?.end && isExpired(j.period.end)), [liveJobs]);
            const scheduleAlerts = useMemo(() => {
                const today = toDateOnly(new Date());
                const weekEnd = new Date();
                weekEnd.setDate(weekEnd.getDate() + 7);
                const withinWeekDeadlines = activeJobs
                    .filter(j => j.period?.end && new Date(j.period.end) <= weekEnd)
                    .sort((a, b) => (a.period?.end || '').localeCompare(b.period?.end || ''));
                const missingInterviewSchedule = [];
                const todayInterviews = [];
                liveJobs.forEach((job) => {
                    (job.candidates || []).forEach((c) => {
                        if (String(c.status || '').includes('면접') && !c.interviewDate) {
                            missingInterviewSchedule.push({ jobTitle: job.title, name: c.name, status: c.status });
                        }
                        if (c.interviewDate && toDateOnly(c.interviewDate) === today) {
                            todayInterviews.push({ jobTitle: job.title, name: c.name, time: c.interviewDate });
                        }
                    });
                });
                return {
                    withinWeekDeadlines,
                    missingInterviewSchedule,
                    todayInterviews
                };
            }, [activeJobs, liveJobs]);

            useEffect(() => {
                if (!user || trashJobs.length === 0) return;
                const THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;
                trashJobs.forEach((job) => {
                    if (job.deletedAt && Date.now() - job.deletedAt > THIRTY_DAYS) {
                        firestoreWrite(job.id, null, true);
                    }
                });
            }, [user, trashJobs]);

            useEffect(() => {
                if (!selectedCandidate) {
                    setScheduleDraft({
                        slots: normalizeInterviewSlots([]),
                        status: 'draft',
                        token: '',
                        sentAt: '',
                        respondedAt: '',
                        confirmedAt: '',
                        selectedSlotId: ''
                    });
                    return;
                }
                const request = selectedCandidate.scheduleRequest || {};
                setScheduleDraft({
                    slots: normalizeInterviewSlots(request.slots),
                    status: request.status || 'draft',
                    token: request.token || '',
                    sentAt: request.sentAt || '',
                    respondedAt: request.respondedAt || '',
                    confirmedAt: request.confirmedAt || '',
                    selectedSlotId: request.selectedSlotId || ''
                });
            }, [selectedCandidate]);

            useEffect(() => {
                if (currentMenu === 'template-settings') {
                    setTemplateDraft(templateSettings);
                }
            }, [currentMenu, templateSettings]);

            const handleSaveJob = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const startDate = fd.get('startDate');
                const endDate = fd.get('endDate');
                if (startDate && endDate && new Date(startDate) > new Date(endDate)) {
                    alert('공고 시작일은 마감일보다 늦을 수 없습니다.');
                    return;
                }
                const jobData = {
                    title: fd.get('title'), team: fd.get('team'), status: '채용중',
                    meta: { type: fd.get('type'), level: fd.get('level'), salary: fd.get('salary'), location: fd.get('location') },
                    period: { start: startDate, end: endDate },
                    skills: fd.get('skills').split(',').map(s => s.trim()), description: fd.get('description'),
                };
                if (editingJob) {
                    await firestoreWrite(editingJob.id, { ...editingJob, ...jobData });
                    alert('공고가 수정되었습니다.');
                } else {
                    const newId = generateId();
                    await firestoreWrite(newId, { ...jobData, id: newId, candidates: [] });
                    alert('새로운 공고가 등록되었습니다.');
                }
                setIsCreateOpen(false); setEditingJob(null);
            };

            const handleManualAdd = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const email = String(fd.get('email') || '').trim().toLowerCase();
                const phone = normalizePhone(fd.get('phone'));
                const duplicate = liveJobs.find((job) =>
                    (job.candidates || []).some((c) => {
                        const emailSame = email && String(c.email || '').trim().toLowerCase() === email;
                        const phoneSame = phone && normalizePhone(c.phone) === phone;
                        return emailSame || phoneSame;
                    })
                );
                if (duplicate) {
                    alert(`중복 지원자 가능성이 있습니다.\n공고: ${duplicate.title}\n이메일/연락처를 확인해주세요.`);
                    return;
                }
                const now = new Date();
                const newCandidate = {
                    id: generateId(), 
                    name: fd.get('name') || '이름 없음', 
                    email: fd.get('email') || '',
                    phone: fd.get('phone') || '',
                    address: fd.get('address') || '',
                    note: fd.get('note') || '',
                    status: '접수', 
                    addedAt: now.toLocaleDateString('ko-KR'),
                    addedAtIso: now.toISOString(),
                    addedAtTs: now.getTime(),
                    interviewDate: null
                };
                
                if (!activeJob?.id) return;
                await updateCandidatesAtomic(activeJob.id, (currentCandidates) => [...currentCandidates, newCandidate]);
                setIsManualAddOpen(false);
                alert('지원자가 등록되었습니다.');
            };
            const downloadCandidateTemplate = () => {
                const rows = [
                    ['이름', '이메일', '연락처', '주소', '비고'],
                    ['홍길동', 'sample@company.com', '010-1234-5678', '서울시 강남구', '포트폴리오 우수']
                ];
                const csv = rows.map((r) => r.map(csvEscape).join(',')).join('\n');
                const bom = '\uFEFF';
                const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '지원자_대량업로드_양식.csv';
                a.click();
                URL.revokeObjectURL(url);
            };
            const parseCsvRows = (text) => {
                const lines = String(text || '').replace(/\r/g, '').split('\n').filter((line) => line.trim() !== '');
                if (lines.length < 2) return [];
                const parseLine = (line) => {
                    const result = [];
                    let current = '';
                    let inQuotes = false;
                    for (let i = 0; i < line.length; i += 1) {
                        const ch = line[i];
                        const next = line[i + 1];
                        if (ch === '"' && inQuotes && next === '"') {
                            current += '"';
                            i += 1;
                        } else if (ch === '"') {
                            inQuotes = !inQuotes;
                        } else if (ch === ',' && !inQuotes) {
                            result.push(current.trim());
                            current = '';
                        } else {
                            current += ch;
                        }
                    }
                    result.push(current.trim());
                    return result;
                };
                const header = parseLine(lines[0]).map((h) => h.trim());
                return lines.slice(1).map((line) => {
                    const cols = parseLine(line);
                    const row = {};
                    header.forEach((key, idx) => { row[key] = cols[idx] || ''; });
                    return row;
                });
            };
            const mapCandidateRow = (raw) => {
                const name = String(raw['이름'] || raw['성명'] || raw['name'] || '').trim();
                const email = String(raw['이메일'] || raw['email'] || '').trim();
                const phone = String(raw['연락처'] || raw['전화번호'] || raw['phone'] || '').trim();
                const address = String(raw['주소'] || raw['주소지'] || raw['address'] || '').trim();
                const note = String(raw['비고'] || raw['메모'] || raw['note'] || '').trim();
                return { name, email, phone, address, note };
            };
            const handleBulkUploadFile = async (file) => {
                if (!file) return;
                if (!activeJob?.id) {
                    alert('대상 공고를 먼저 선택해주세요.');
                    return;
                }
                setBulkUploading(true);
                setBulkUploadResult(null);
                try {
                    let rows = [];
                    const fileName = String(file.name || '').toLowerCase();
                    if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
                        if (!window.XLSX) throw new Error('엑셀 파서 로드 실패');
                        const buffer = await file.arrayBuffer();
                        const workbook = window.XLSX.read(new Uint8Array(buffer), { type: 'array' });
                        const firstSheet = workbook.SheetNames[0];
                        rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet], { defval: '' });
                    } else {
                        const text = await file.text();
                        rows = parseCsvRows(text);
                    }
                    if (!rows.length) {
                        alert('업로드할 데이터가 없습니다.');
                        setBulkUploading(false);
                        return;
                    }
                    const mapped = rows.map(mapCandidateRow);
                    const duplicatesInSystem = [];
                    const duplicatesInFile = [];
                    const invalidRows = [];
                    const validCandidates = [];
                    const existingIndex = new Set();
                    liveJobs.forEach((job) => {
                        (job.candidates || []).forEach((c) => {
                            const e = String(c.email || '').trim().toLowerCase();
                            const p = normalizePhone(c.phone);
                            if (e) existingIndex.add(`e:${e}`);
                            if (p) existingIndex.add(`p:${p}`);
                        });
                    });
                    const fileIndex = new Set();
                    mapped.forEach((row, i) => {
                        const rowNum = i + 2;
                        const name = row.name;
                        const email = String(row.email || '').toLowerCase();
                        const phone = normalizePhone(row.phone);
                        if (!name) {
                            invalidRows.push(`행 ${rowNum}: 이름 누락`);
                            return;
                        }
                        if (!email && !phone) {
                            invalidRows.push(`행 ${rowNum}: 이메일/연락처 중 1개 이상 필요`);
                            return;
                        }
                        const fileEmailKey = email ? `e:${email}` : '';
                        const filePhoneKey = phone ? `p:${phone}` : '';
                        if ((fileEmailKey && fileIndex.has(fileEmailKey)) || (filePhoneKey && fileIndex.has(filePhoneKey))) {
                            duplicatesInFile.push(`행 ${rowNum}: 파일 내 중복`);
                            return;
                        }
                        if ((fileEmailKey && existingIndex.has(fileEmailKey)) || (filePhoneKey && existingIndex.has(filePhoneKey))) {
                            duplicatesInSystem.push(`행 ${rowNum}: 기존 데이터 중복`);
                            return;
                        }
                        if (fileEmailKey) fileIndex.add(fileEmailKey);
                        if (filePhoneKey) fileIndex.add(filePhoneKey);
                        const now = new Date();
                        validCandidates.push({
                            id: generateId(),
                            name,
                            email: row.email || '',
                            phone: row.phone || '',
                            address: row.address || '',
                            note: row.note || '',
                            status: '접수',
                            addedAt: now.toLocaleDateString('ko-KR'),
                            addedAtIso: now.toISOString(),
                            addedAtTs: now.getTime(),
                            interviewDate: null
                        });
                    });
                    if (!validCandidates.length) {
                        setBulkUploadResult({
                            total: rows.length,
                            success: 0,
                            failed: invalidRows.length + duplicatesInSystem.length + duplicatesInFile.length,
                            invalidRows,
                            duplicatesInSystem,
                            duplicatesInFile
                        });
                        return;
                    }
                    await updateCandidatesAtomic(activeJob.id, (currentCandidates) => [...currentCandidates, ...validCandidates]);
                    setBulkUploadResult({
                        total: rows.length,
                        success: validCandidates.length,
                        failed: invalidRows.length + duplicatesInSystem.length + duplicatesInFile.length,
                        invalidRows,
                        duplicatesInSystem,
                        duplicatesInFile
                    });
                } catch (err) {
                    console.error('대량 업로드 실패:', err);
                    alert(`대량 업로드 실패: ${err.message || err}`);
                } finally {
                    setBulkUploading(false);
                }
            };

            const handleUpdateCandidateInterview = async (date) => {
                if (!activeJob?.id || !selectedCandidate?.id) return;
                const updatedCandidates = await updateCandidatesAtomic(activeJob.id, (currentCandidates) =>
                    currentCandidates.map(c => c.id === selectedCandidate.id ? { ...c, interviewDate: date } : c)
                );
                if (updatedCandidates) {
                    const latest = updatedCandidates.find(c => c.id === selectedCandidate.id);
                    if (latest) setSelectedCandidate(latest);
                }
            };
            const handleDraftSlotChange = (slotId, datetime) => {
                setScheduleDraft((prev) => ({
                    ...prev,
                    slots: prev.slots.map((slot) => slot.id === slotId ? { ...slot, datetime } : slot)
                }));
            };
            const persistScheduleRequest = async ({ markSent = false } = {}) => {
                if (!activeJob?.id || !selectedCandidate?.id) return null;
                const validSlots = scheduleDraft.slots.filter((slot) => slot.datetime);
                if (!validSlots.length) {
                    alert('제안 일정은 최소 1개 이상 입력해주세요.');
                    return null;
                }
                setBookingActionBusy(true);
                const nowIso = new Date().toISOString();
                const updatedCandidates = await updateCandidatesAtomic(activeJob.id, (currentCandidates) =>
                    currentCandidates.map((candidate) => {
                        if (candidate.id !== selectedCandidate.id) return candidate;
                        const currentRequest = candidate.scheduleRequest || {};
                        const token = currentRequest.token || scheduleDraft.token || generateToken();
                        const selectedSlotStillValid = currentRequest.selectedSlotId && validSlots.some((slot) => slot.id === currentRequest.selectedSlotId);
                        const nextStatus = currentRequest.status === 'confirmed'
                            ? 'confirmed'
                            : markSent
                                ? 'sent'
                                : selectedSlotStillValid && currentRequest.status === 'responded'
                                    ? 'responded'
                                    : 'ready';
                        return {
                            ...candidate,
                            scheduleRequest: {
                                ...currentRequest,
                                token,
                                slots: validSlots,
                                status: nextStatus,
                                sentAt: markSent ? nowIso : (currentRequest.sentAt || ''),
                                respondedAt: selectedSlotStillValid ? (currentRequest.respondedAt || '') : '',
                                confirmedAt: currentRequest.confirmedAt || '',
                                selectedSlotId: selectedSlotStillValid ? currentRequest.selectedSlotId : ''
                            }
                        };
                    })
                );
                setBookingActionBusy(false);
                if (!updatedCandidates) return null;
                const latest = updatedCandidates.find((candidate) => candidate.id === selectedCandidate.id);
                if (latest) setSelectedCandidate(latest);
                return latest || null;
            };
            const copyBookingLink = async () => {
                const latest = await persistScheduleRequest();
                if (!latest) return;
                const link = buildBookingUrl({
                    jobId: activeJob?.id,
                    candidateId: latest.id,
                    token: latest.scheduleRequest?.token
                });
                if (!link) return;
                try {
                    await navigator.clipboard.writeText(link);
                    alert('예약 링크가 복사되었습니다.');
                } catch (err) {
                    alert(`링크 복사 실패\n${link}`);
                }
            };
            const markBookingLinkSent = async () => {
                const latest = await persistScheduleRequest({ markSent: true });
                if (!latest) return;
                const bookingUrl = buildBookingUrl({
                    jobId: activeJob?.id,
                    candidateId: latest.id,
                    token: latest.scheduleRequest?.token
                });
                const endpoint = getNotificationEndpoint();
                const payload = {
                    candidateId: latest.id,
                    candidateName: latest.name,
                    phone: latest.phone,
                    email: latest.email,
                    jobId: activeJob?.id,
                    jobTitle: activeJob?.title,
                    team: activeJob?.team,
                    slots: latest.scheduleRequest?.slots || [],
                    bookingUrl,
                    message: buildInterviewRequestMessage({
                        candidateName: latest.name,
                        companyName: templateSettings.companyName,
                        jobTitle: activeJob?.title,
                        slots: latest.scheduleRequest?.slots || [],
                        bookingUrl,
                        templateSettings
                    })
                };

                if (!endpoint) {
                    alert('발송 상태만 기록했습니다.\nwindow.RECRUIT_NOTI_CONFIG.notificationEndpoint 설정 후 실제 카카오 발송을 연결할 수 있습니다.');
                    return;
                }

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json().catch(() => ({}));
                    if (!response.ok) {
                        throw new Error(result?.error || '알림 발송 요청 실패');
                    }
                    alert(`알림 발송 요청 완료\n상태: ${result?.status || 'queued'}`);
                } catch (error) {
                    console.error('알림 발송 요청 실패:', error);
                    alert(`발송 상태는 기록했지만 백엔드 호출은 실패했습니다.\n${error.message || error}`);
                }
            };
            const confirmCandidateSchedule = async () => {
                if (!activeJob?.id || !selectedCandidate?.id) return;
                const selectedSlot = getSelectedSlot(selectedCandidate);
                if (!selectedSlot?.datetime) {
                    alert('지원자가 선택한 일정이 없습니다.');
                    return;
                }
                setBookingActionBusy(true);
                const nowIso = new Date().toISOString();
                const updatedCandidates = await updateCandidatesAtomic(activeJob.id, (currentCandidates) =>
                    currentCandidates.map((candidate) => {
                        if (candidate.id !== selectedCandidate.id) return candidate;
                        const currentRequest = candidate.scheduleRequest || {};
                        return {
                            ...candidate,
                            interviewDate: selectedSlot.datetime,
                            scheduleRequest: {
                                ...currentRequest,
                                status: 'confirmed',
                                confirmedAt: nowIso
                            }
                        };
                    })
                );
                setBookingActionBusy(false);
                if (!updatedCandidates) return;
                const latest = updatedCandidates.find((candidate) => candidate.id === selectedCandidate.id);
                if (latest) {
                    setSelectedCandidate(latest);
                    alert('지원자 선택 일정이 확정되었습니다.');
                }
            };

            const handleDeleteJob = async (id, e) => {
                e.stopPropagation();
                if (window.confirm('정말 삭제하시겠습니까?')) {
                    await firestoreWrite(id, { deletedAt: Date.now(), deletedBy: user?.uid || 'anonymous' });
                    if(activeJobId === id) { setViewMode('list'); setActiveJobId(null); }
                }
            };

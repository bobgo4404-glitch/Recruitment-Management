                                <div className="rounded-xl border border-red-100 bg-red-50 p-4">
                                    <div className="text-red-800 font-bold mb-1">7일 이내 마감</div>
                                    <div className="text-2xl font-bold text-red-700">{scheduleAlerts.withinWeekDeadlines.length}</div>
                                    <div className="text-red-700/80 mt-1">채용공고 마감 임박</div>
                                </div>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                            {[{ title: '진행중 공고', value: totalActive, unit: '건', color: 'blue', icon: Icons.Briefcase }, { title: '전체 누적 지원자', value: totalCandidates, unit: '명', color: 'purple', icon: Icons.Users }, { title: '면접 진행중', value: interviewees, unit: '명', color: 'orange', icon: Icons.Activity }, { title: '누적 합격자', value: hiredCount, unit: '명', color: 'green', icon: Icons.TrendingUp }].map((kpi, i) => (
                                <div key={i} className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-start mb-4"><div className={`p-3 rounded-xl bg-${kpi.color}-50 text-${kpi.color}-600`}><kpi.icon className="w-6 h-6" /></div></div>
                                    <div className="text-3xl font-bold text-gray-900">{kpi.value}<span className="text-base text-gray-400 font-normal ml-1">{kpi.unit}</span></div><div className="text-sm text-gray-500 mt-1">{kpi.title}</div>
                                </div>
                            ))}
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div className="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm"><h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2"><Icons.BarChart className="w-5 h-5 text-gray-400" /> 부서별 지원 현황</h3>
                                <div className="space-y-6">{departmentStats.length > 0 ? departmentStats.map((dept, i) => (<div key={i}><div className="flex justify-between text-sm mb-2"><span className="font-medium text-gray-700">{dept.name}</span><span className="text-gray-500">{dept.count}명</span></div><div className="h-3 w-full bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-brand-500 rounded-full animate-grow-width" style={{ '--target-width': `${(dept.count/dept.total)*100}%` }}></div></div></div>)) : <div className="text-center text-gray-400 text-sm py-4">진행 중인 공고가 없습니다.</div>}</div></div>
                            <div className="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm"><h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2"><Icons.Layout className="w-5 h-5 text-gray-400" /> 전체 채용 파이프라인</h3>
                                <div className="flex items-end justify-between h-48 space-x-2">{STAGES.map((stage, i) => { const count = activeJobs.reduce((acc, j) => acc + (j.candidates || []).filter(c => c.status === stage).length, 0); const maxCount = totalCandidates || 1; const height = totalCandidates > 0 ? (count / maxCount) * 100 : 5; return (<div key={stage} className="flex-1 flex flex-col justify-end items-center group"><div className="mb-2 text-xs font-bold text-brand-600 opacity-0 group-hover:opacity-100 transition-opacity">{count}명</div><div className="w-full bg-brand-100 rounded-t-lg transition-all hover:bg-brand-400 relative group-hover:shadow-lg" style={{ height: `${Math.max(height, 5)}%` }}></div><div className="mt-3 text-xs text-gray-500 font-medium rotate-0 whitespace-nowrap">{stage}</div></div>)})}</div></div>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div className="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm"><h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2"><Icons.Zap className="w-5 h-5 text-gray-400" /> 가장 많이 요구되는 기술 스택 (TOP 5)</h3>
                                <div className="space-y-4">{skillCounts.map(([skill, count], i) => (<div key={i} className="flex items-center gap-4"><div className="w-24 text-sm font-medium text-gray-600 truncate">{skill}</div><div className="flex-1 h-3 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-indigo-500 rounded-full animate-grow-width" style={{ '--target-width': `${(count / (skillCounts[0][1] || 1)) * 100}%` }}></div></div><div className="w-8 text-right text-xs font-bold text-indigo-600">{count}건</div></div>))}{skillCounts.length === 0 && <div className="text-center text-gray-400 text-sm py-4">데이터가 충분하지 않습니다.</div>}</div></div>
                            <div className="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm"><h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2"><Icons.Clock className="w-5 h-5 text-gray-400" /> 실시간 지원 현황 (최근 5건)</h3>
                                <div className="space-y-0 divide-y divide-gray-50">{recentActivities.map((log, i) => (<div key={i} className="py-4 flex items-center justify-between first:pt-0 last:pb-0"><div className="flex items-center gap-3"><div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-gray-100 text-gray-600`}>{log.name[0]}</div><div><div className="text-sm font-bold text-gray-800">{log.name}</div><div className="text-xs text-gray-500 truncate w-40">{log.jobTitle}</div></div></div><div className="text-right"><Badge colorClass="bg-blue-50 text-blue-600 border-blue-100">{log.status}</Badge><div className="text-xs text-gray-400 mt-1">{formatCandidateAddedAt(log)}</div></div></div>))}{recentActivities.length === 0 && <div className="text-center text-gray-400 text-sm py-4">최근 활동 내역이 없습니다.</div>}</div></div>
                        </div>
                    </div>
                );
            };

            const JobList = ({ type }) => {
                const targetJobs = type === 'active' ? activeJobs : type === 'closed' ? closedJobs : trashJobs;
                const isClosedView = type === 'closed';
                const isTrashView = type === 'trash';
                return (
                    <div className="p-8 animate-fade-in-up h-full overflow-y-auto pb-20 custom-scrollbar">
                         <div className="flex justify-between items-end mb-8">
                            <div><h2 className="text-2xl font-bold text-gray-800">{isTrashView ? '휴지통' : isClosedView ? '마감된 공고 아카이브' : '진행 중인 채용 공고'}</h2><p className="text-gray-500 mt-1">{isTrashView ? '삭제된 공고는 30일 후 자동 영구삭제됩니다.' : isClosedView ? '기간이 만료된 공고를 조회하고 관리합니다.' : '현재 지원자를 모집 중인 공고를 관리합니다.'}</p></div>
                            {!isClosedView && !isTrashView && (<button onClick={openCreateModal} className="bg-brand-600 hover:bg-brand-700 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 shadow-lg shadow-brand-500/20 transition-all"><Icons.Plus className="w-5 h-5" /> 새 공고 만들기</button>)}
                        </div>
                        {targetJobs.length === 0 ? (<div className="flex flex-col items-center justify-center h-64 text-gray-400 border-2 border-dashed border-gray-200 rounded-xl"><Icons.Briefcase className="w-12 h-12 mb-4 text-gray-300" /><span className="text-lg font-medium">{isTrashView ? '휴지통이 비어 있습니다.' : isClosedView ? '마감된 공고가 없습니다.' : '진행 중인 공고가 없습니다.'}</span></div>) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {targetJobs.map(job => {
                                    const dday = job.period ? getDday(job.period.end) : '-';
                                    return (
                                        <div key={job.id} onClick={() => { if (!isTrashView) { setActiveJobId(job.id); setViewMode('detail'); } }} className={`bg-white rounded-xl border p-6 ${isTrashView ? '' : 'cursor-pointer'} hover:shadow-lg transition-all group relative ${isClosedView ? 'border-gray-200 bg-gray-50' : 'border-gray-200 hover:border-brand-300'}`}>
                                            <div className="absolute top-4 right-4 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                                {!isClosedView && !isTrashView && (
                                                    <>
                                                        <button onClick={(e) => { e.stopPropagation(); handleEarlyClose(job.id); }} className="p-1.5 text-gray-400 hover:text-orange-600 hover:bg-orange-50 rounded" title="조기 마감"><Icons.StopCircle className="w-4 h-4" /></button>
                                                        <button onClick={(e) => openEditModal(job, e)} className="p-1.5 text-gray-400 hover:text-brand-600 hover:bg-brand-50 rounded"><Icons.Edit className="w-4 h-4" /></button>
                                                    </>
                                                )}
                                                {!isTrashView && <button onClick={(e) => handleDeleteJob(job.id, e)} className="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded"><Icons.Trash2 className="w-4 h-4" /></button>}
                                                {isTrashView && <button onClick={(e) => { e.stopPropagation(); handleRestoreJob(job.id); }} className="p-1.5 text-gray-400 hover:text-green-600 hover:bg-green-50 rounded" title="복구"><Icons.CheckCircle className="w-4 h-4" /></button>}
                                                {isTrashView && <button onClick={(e) => { e.stopPropagation(); handleHardDeleteJob(job.id); }} className="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded" title="영구삭제"><Icons.Trash2 className="w-4 h-4" /></button>}
                                            </div>
                                            <div className="flex justify-between items-start mb-4"><div className="flex gap-2"><Badge colorClass={isTrashView ? 'bg-red-100 text-red-700 border-red-200' : isClosedView ? 'bg-gray-200 text-gray-600 border-gray-300' : 'bg-green-100 text-green-700 border-green-200'}>{isTrashView ? '삭제됨' : isClosedView ? '마감됨' : job.status}</Badge>{!isClosedView && !isTrashView && <Badge colorClass="bg-red-50 text-red-600 border-red-100">{dday}</Badge>}</div></div>
                                            <h3 className={`text-xl font-bold mb-1 transition-colors ${isClosedView ? 'text-gray-600' : 'text-gray-900 group-hover:text-brand-600'}`}>{job.title}</h3>
                                            <div className="text-xs text-gray-500 mb-4 flex items-center gap-1"><Icons.Calendar className="w-3 h-3" />{job.period ? `${job.period.start} ~ ${job.period.end}` : '기간 미설정'}</div>
                                            <div className="space-y-2 mb-6 text-sm text-gray-500"><div className="flex justify-between"><span>{job.team}</span><span>{job.meta.location}</span></div></div>
                                            <div className="bg-white/50 rounded-lg p-3 flex justify-between text-center divide-x divide-gray-200 border border-gray-100"><div className="flex-1 px-1"><div className="text-xs text-gray-400 mb-1">지원자</div><div className="font-bold text-gray-800">{(job.candidates || []).length}</div></div><div className="flex-1 px-1"><div className="text-xs text-brand-500 mb-1">진행중</div><div className="font-bold text-brand-600">{(job.candidates || []).filter(c => !['최종합격', '불합격'].includes(c.status)).length}</div></div><div className="flex-1 px-1"><div className="text-xs text-green-500 mb-1">합격</div><div className="font-bold text-green-600">{(job.candidates || []).filter(c => c.status === '최종합격').length}</div></div></div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                );
            };

            const JobDetail = () => {
                const [tab, setTab] = useState('kanban'); 
                const candidates = activeJob.candidates || []; 
                const funnelData = STAGES.map(stage => ({ stage, count: candidates.filter(c => c.status === stage).length }));
                const isReadOnly = isExpired(activeJob.period.end);

                return (
                    <div className="h-full flex flex-col animate-slide-in">
                        <div className="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shrink-0">
                            <div className="flex items-center gap-4">
                                <button onClick={() => { setViewMode('list'); setActiveJobId(null); }} className="p-2 hover:bg-gray-100 rounded-full text-gray-500"><Icons.ArrowLeft className="w-5 h-5" /></button>
                                <div><h1 className="text-xl font-bold text-gray-900 flex items-center gap-2">{activeJob.title}{isReadOnly && <span className="bg-gray-200 text-gray-600 text-xs px-2 py-0.5 rounded">마감됨</span>}</h1><div className="text-xs text-gray-500 flex gap-2 mt-1"><span className="flex items-center gap-1"><Icons.Calendar className="w-3 h-3"/> {activeJob.period.start} ~ {activeJob.period.end}</span></div></div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-gray-100 p-1 rounded-lg flex text-sm font-medium"><button onClick={() => setTab('kanban')} className={`px-3 py-1.5 rounded-md flex items-center gap-2 ${tab === 'kanban' ? 'bg-white shadow text-brand-600' : 'text-gray-500'}`}><Icons.Layout className="w-4 h-4" /> 칸반보드</button><button onClick={() => setTab('analytics')} className={`px-3 py-1.5 rounded-md flex items-center gap-2 ${tab === 'analytics' ? 'bg-white shadow text-brand-600' : 'text-gray-500'}`}><Icons.BarChart className="w-4 h-4" /> 성과분석</button></div>
                                {!isReadOnly && (
                                    <>
                                        <button onClick={() => handleEarlyClose(activeJob.id)} className="bg-white text-orange-600 hover:bg-orange-50 border border-orange-200 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm transition-all"><Icons.StopCircle className="w-4 h-4" /> 조기 마감</button>
                                        <button onClick={() => { setBulkUploadResult(null); setIsBulkUploadOpen(true); }} className="bg-white text-brand-700 hover:bg-brand-50 border border-brand-200 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm transition-all">엑셀 업로드</button>
                                        <button onClick={() => setIsManualAddOpen(true)} className="bg-white text-gray-700 hover:bg-gray-50 border border-gray-200 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm transition-all"><Icons.Plus className="w-4 h-4" /> 지원자 등록</button>
                                    </>
                                )}
                            </div>
                        </div>
                        {tab === 'kanban' ? (
                            <div className="flex-1 overflow-x-auto overflow-y-hidden p-6 bg-slate-100">
                                <div className="flex gap-4 h-full min-w-max">
                                    {STAGES.map(stage => {
                                        const colCandidates = candidates.filter(c => c.status === stage);
                                        return (
                                            <div key={stage} className="w-80 flex flex-col bg-slate-50 rounded-xl border border-slate-200/60 shadow-sm max-h-full">
                                                <div className={`p-3 border-b border-gray-100 flex justify-between items-center rounded-t-xl bg-white`}><div className="flex items-center gap-2"><div className={`w-2.5 h-2.5 rounded-full bg-brand-500`}></div><span className="font-bold text-gray-700">{stage}</span></div><span className="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-xs font-bold">{colCandidates.length}</span></div>
                                                <div className="p-2 flex-1 overflow-y-auto space-y-2 custom-scrollbar">
                                                    {colCandidates.map(c => {
                                                        return (
                                                            <div key={c.id} onClick={() => { setSelectedCandidate(c); setIsCandidateModalOpen(true); }} className="bg-white p-3 rounded-lg shadow-sm border border-gray-200 hover:shadow-md hover:border-brand-300 cursor-pointer transition-all group relative">
                                                                {!isReadOnly && (
                                                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                                                        <button onClick={(e) => handleDeleteCandidate(c.id, e)} className="p-1.5 text-gray-400 hover:text-red-500 rounded-full bg-white shadow-sm hover:shadow border border-gray-100" title="지원자 삭제">
                                                                            <Icons.Trash2 className="w-3.5 h-3.5" />
                                                                        </button>
                                                                    </div>
                                                                )}
                                                                <div className="flex justify-between items-start mb-2 pr-6"><h4 className="font-bold text-gray-800">{c.name}</h4><span className="text-xs font-bold px-1.5 py-0.5 rounded bg-gray-100 text-gray-600">{formatCandidateAddedAt(c)}</span></div>
                                                                <div className="text-xs text-gray-500 mb-2 truncate">{c.email}</div>
                                                                <div className="text-xs text-gray-400 mb-3 truncate">{c.phone}</div>
                                                                {c.interviewDate && <div className="mb-2 inline-flex items-center bg-orange-50 text-orange-700 px-2 py-1 rounded text-xs font-bold"><Icons.Calendar className="w-3 h-3 mr-1"/>{new Date(c.interviewDate).toLocaleString('ko-KR', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'})}</div>}
                                                                {!c.interviewDate && (c.status.includes('면접')) && <div className="mb-2 inline-flex items-center text-gray-400 text-xs"><Icons.Calendar className="w-3 h-3 mr-1"/>일정 미정</div>}
                                                                
                                                                {!isReadOnly && (<div className="flex justify-between mt-2 pt-2 border-t border-gray-50 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity"><button onClick={(e) => { e.stopPropagation(); moveCandidate(c.id, -1); }} disabled={stage === STAGES[0]} className="text-xs text-gray-400 hover:text-brand-600 disabled:opacity-30">◀ 이전</button><button onClick={(e) => { e.stopPropagation(); moveCandidate(c.id, 1); }} disabled={stage === STAGES[STAGES.length-1]} className="text-xs text-gray-400 hover:text-brand-600 disabled:opacity-30">다음 ▶</button></div>)}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="p-8 overflow-y-auto flex-1 bg-slate-50">
                                <div className="max-w-4xl mx-auto space-y-8">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                                        <h3 className="text-lg font-bold text-gray-800 mb-6">채용 깔때기</h3>
                                        <div className="space-y-4">{funnelData.map((d, idx) => (<div key={d.stage} className="relative"><div className="flex items-center mb-1 text-sm font-medium text-gray-600"><span className="w-24">{d.stage}</span><span className="ml-auto font-bold text-gray-900">{d.count}명</span></div><div className="h-8 bg-gray-100 rounded-r-lg overflow-hidden relative"><div className="h-full bg-brand-500 opacity-90 transition-all duration-1000 ease-out" style={{ width: `${idx === 0 ? 100 : (d.count / (funnelData[0].count || 1)) * 100}%` }}></div></div></div>))}</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderContent = () => {
                if (viewMode === 'detail' && activeJob) return <JobDetail />;
                switch (currentMenu) {
                    case 'dashboard': return <AdvancedDashboard />;
                    case 'active': return <JobList type="active" />;
                    case 'closed': return <JobList type="closed" />;
                    case 'trash': return <JobList type="trash" />;
                    case 'calendar': return <CalendarView />;
                    case 'template-settings': return <KakaoTemplateSettingsPage />;
                    default: return <AdvancedDashboard />;
                }
            };

            if (!fbReady) {
                return <div className="min-h-screen flex items-center justify-center bg-slate-50"><div className="text-center"><Icons.Cloud className="w-12 h-12 text-brand-500 animate-bounce mx-auto mb-4" /><p className="text-slate-600 font-medium">채용 클라우드에 연결 중...</p></div></div>;
            }

            if (isBookingMode) {
                return <BookingPage />;
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row text-slate-900">
                    <div className="w-64 bg-slate-900 text-white flex flex-col shrink-0 transition-all">
                        <div className="p-6 border-b border-slate-800 flex items-center gap-3">
                            <div className="w-8 h-8 bg-brand-500 rounded flex items-center justify-center font-bold text-white">R</div>
                            <span className="font-bold text-lg">Recruit<span className="text-brand-400">Pro</span></span>
                        </div>
                        <div className="p-4 flex-1 space-y-1">
                            <div className="text-xs font-bold text-slate-500 mb-4 px-2">메인 메뉴</div>
                            {[
                                { id: 'dashboard', label: '대시보드', icon: Icons.Activity },
                                { id: 'active', label: '진행중인 공고', icon: Icons.Briefcase },
                                { id: 'closed', label: '마감된 공고', icon: Icons.Archive },
                                { id: 'calendar', label: '면접 일정', icon: Icons.Calendar },
                                { id: 'template-settings', label: '카카오톡 템플릿 설정', icon: Icons.FileText },
                                { id: 'trash', label: `휴지통 (${trashJobs.length})`, icon: Icons.Trash2 }
                            ].map(menu => (
                                <button key={menu.id} onClick={() => { setCurrentMenu(menu.id); setViewMode('list'); setActiveJobId(null); }} 
                                        className={`w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 transition-colors ${currentMenu === menu.id ? 'bg-brand-600 text-white shadow-lg shadow-brand-900/50' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                    <menu.icon className="w-5 h-5" /> {menu.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="flex-1 overflow-hidden h-screen">
                        {renderContent()}
                    </main>

                    <Modal isOpen={isCreateOpen} onClose={() => setIsCreateOpen(false)} title={editingJob ? "공고 수정" : "새 공고 등록"} size="lg">
                        <form onSubmit={handleSaveJob} className="space-y-6">
                            <div className="grid grid-cols-2 gap-6">
                                <div className="col-span-2"><label className="block text-sm font-bold mb-1">제목</label><input name="title" defaultValue={editingJob?.title} required className="w-full border p-2.5 rounded-lg" /></div>
                                <div><label className="block text-sm font-bold mb-1">부서</label><input name="team" defaultValue={editingJob?.team} required className="w-full border p-2.5 rounded-lg" /></div>
                                <div><label className="block text-sm font-bold mb-1">근무지</label><input name="location" defaultValue={editingJob?.meta?.location} required className="w-full border p-2.5 rounded-lg" /></div>
                                <div><label className="block text-sm font-bold mb-1">시작일</label><input type="date" name="startDate" defaultValue={editingJob?.period?.start} required className="w-full border p-2.5 rounded-lg" /></div>
                                <div><label className="block text-sm font-bold mb-1">마감일</label><input type="date" name="endDate" defaultValue={editingJob?.period?.end} required className="w-full border p-2.5 rounded-lg" /></div>
                                <div><label className="block text-sm font-bold mb-1">고용형태</label><select name="type" defaultValue={editingJob?.meta?.type} className="w-full border p-2.5 rounded-lg"><option>정규직</option><option>계약직</option></select></div>
                                <div><label className="block text-sm font-bold mb-1">경력</label><select name="level" defaultValue={editingJob?.meta?.level} className="w-full border p-2.5 rounded-lg"><option>신입</option><option>경력</option><option>무관</option></select></div>
                                <div><label className="block text-sm font-bold mb-1">연봉</label><input name="salary" defaultValue={editingJob?.meta?.salary} className="w-full border p-2.5 rounded-lg" /></div>
                                <div><label className="block text-sm font-bold mb-1">기술스택</label><input name="skills" defaultValue={editingJob?.skills?.join(', ')} required className="w-full border p-2.5 rounded-lg" /></div>
                            </div>
                            <div><label className="block text-sm font-bold mb-1">상세내용</label><textarea name="description" defaultValue={editingJob?.description} rows="4" className="w-full border p-2.5 rounded-lg"></textarea></div>
                            <div className="flex justify-end"><button className="bg-brand-600 text-white px-6 py-3 rounded-xl font-bold">{editingJob ? '수정' : '등록'}</button></div>
                        </form>
                    </Modal>

                    <Modal isOpen={isManualAddOpen} onClose={() => setIsManualAddOpen(false)} title="지원자 등록">
                        <form onSubmit={handleManualAdd} className="space-y-4">
                            <div><label className="block text-sm font-bold mb-1">이름</label><input name="name" required className="w-full border p-2.5 rounded-lg" /></div>
                            <div><label className="block text-sm font-bold mb-1">이메일</label><input name="email" type="email" className="w-full border p-2.5 rounded-lg" /></div>
                            <div><label className="block text-sm font-bold mb-1">연락처</label><input name="phone" className="w-full border p-2.5 rounded-lg" placeholder="010-0000-0000" /></div>
                            <div><label className="block text-sm font-bold mb-1">주소지 (간략)</label><input name="address" className="w-full border p-2.5 rounded-lg" placeholder="서울시 강남구" /></div>
                            <div><label className="block text-sm font-bold mb-1">비고</label><textarea name="note" rows="3" className="w-full border p-2.5 rounded-lg" placeholder="특이사항 입력"></textarea></div>
                            <div className="flex justify-end"><button className="bg-brand-600 text-white px-6 py-2 rounded-xl font-bold">등록하기</button></div>
                        </form>
                    </Modal>
                    <Modal isOpen={isBulkUploadOpen} onClose={() => setIsBulkUploadOpen(false)} title="지원자 엑셀 대량 업로드">
                        <div className="space-y-4">
                            <div className="p-4 rounded-lg bg-blue-50 border border-blue-100">
                                <div className="text-sm text-blue-800 font-semibold mb-1">업로드 안내</div>
                                <div className="text-xs text-blue-700">CSV, XLSX 파일을 지원합니다. 필수 컬럼은 `이름` + (`이메일` 또는 `연락처`)입니다.</div>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                <button type="button" onClick={downloadCandidateTemplate} className="px-3 py-2 text-sm rounded-lg border border-gray-200 bg-white hover:bg-gray-50">양식 다운로드 (CSV)</button>
                                <label className={`px-3 py-2 text-sm rounded-lg ${bulkUploading ? 'bg-gray-200 text-gray-500' : 'bg-brand-600 text-white hover:bg-brand-700'} cursor-pointer`}>
                                    파일 선택 및 업로드
                                    <input
                                        type="file"
                                        accept=".csv,.xlsx,.xls"
                                        className="hidden"
                                        disabled={bulkUploading}
                                        onChange={(e) => {
                                            const file = e.target.files && e.target.files[0];
                                            handleBulkUploadFile(file);
                                            e.target.value = '';
                                        }}
                                    />
                                </label>
                            </div>
                            {bulkUploading && <div className="text-sm text-gray-600">업로드 처리 중입니다...</div>}
                            {bulkUploadResult && (
                                <div className="p-4 rounded-lg border border-gray-200 bg-gray-50 space-y-2">
                                    <div className="text-sm font-semibold text-gray-800">처리 결과</div>
                                    <div className="text-sm text-gray-700">총 {bulkUploadResult.total}건 / 성공 {bulkUploadResult.success}건 / 실패 {bulkUploadResult.failed}건</div>
                                    {(bulkUploadResult.invalidRows.length > 0 || bulkUploadResult.duplicatesInSystem.length > 0 || bulkUploadResult.duplicatesInFile.length > 0) && (
                                        <div className="text-xs text-gray-600 max-h-40 overflow-y-auto bg-white border rounded p-2 space-y-1">
                                            {bulkUploadResult.invalidRows.map((msg, idx) => <div key={`i-${idx}`}>{msg}</div>)}
                                            {bulkUploadResult.duplicatesInFile.map((msg, idx) => <div key={`f-${idx}`}>{msg}</div>)}
                                            {bulkUploadResult.duplicatesInSystem.map((msg, idx) => <div key={`s-${idx}`}>{msg}</div>)}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </Modal>

                    <Modal isOpen={isCandidateModalOpen} onClose={() => setIsCandidateModalOpen(false)} title="지원자 상세 정보">
                        {selectedCandidate && (
                            <div className="space-y-6">
                                {/* 상단 헤더 */}
                                <div className="flex justify-between items-start pb-4 border-b">
                                    <div>
                                        <h2 className="text-2xl font-bold text-gray-900">{selectedCandidate.name}</h2>
                                        <div className="flex gap-4 mt-2 text-sm text-gray-600">
                                            {selectedCandidate.email && <span className="flex items-center gap-1"><Icons.Mail className="w-4 h-4"/> {selectedCandidate.email}</span>}
                                            {selectedCandidate.phone && <span className="flex items-center gap-1"><Icons.Phone className="w-4 h-4"/> {selectedCandidate.phone}</span>}
                                        </div>
                                    </div>
                                    <div className={`px-3 py-1.5 rounded-lg text-sm font-bold bg-blue-50 text-blue-600`}>
                                        {selectedCandidate.status}
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="p-4 bg-gray-50 rounded-xl border border-gray-200">
                                        <h4 className="font-bold text-gray-700 mb-3 flex items-center gap-2"><Icons.MapPin className="w-4 h-4 text-orange-500"/> 주소지</h4>
                                        <p className="text-sm text-gray-600">{selectedCandidate.address || '정보 없음'}</p>
                                    </div>
                                    <div className="p-4 bg-gray-50 rounded-xl border border-gray-200">
                                        <h4 className="font-bold text-gray-700 mb-3 flex items-center gap-2"><Icons.Clock className="w-4 h-4 text-blue-500"/> 등록 정보</h4>
                                        <div className="space-y-1 text-sm text-gray-600">
                                            <div className="flex justify-between"><span>등록일:</span> <span className="font-medium">{formatCandidateAddedAt(selectedCandidate)}</span></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                                    <h4 className="font-bold mb-2 flex items-center gap-2"><Icons.FileText className="w-4 h-4" /> 비고</h4>
                                    <p className="text-gray-700 text-sm whitespace-pre-wrap max-h-60 overflow-y-auto">{selectedCandidate.note || "내용 없음"}</p>
                                </div>

                                {/* 면접 일정 */}
                                {(selectedCandidate.status.includes('면접')) && (
                                    <div className="space-y-4">
                                        <div className="bg-blue-50 border border-blue-100 rounded-lg p-4">
                                            <div className="flex items-start justify-between gap-3 mb-3">
                                                <div>
                                                    <h4 className="font-bold text-blue-800 flex items-center gap-2"><Icons.Calendar className="w-4 h-4" /> 카카오 발송 메뉴</h4>
                                                    <p className="text-xs text-blue-600 mt-1">후보 시간을 정하고 카카오 알림 발송용 링크와 문구를 준비합니다.</p>
                                                </div>
                                                <Badge colorClass="bg-white text-blue-700 border-blue-200">
                                                    {SCHEDULE_REQUEST_STATUS_LABELS[getScheduleRequestStatus(selectedCandidate)] || '초안'}
                                                </Badge>
                                            </div>
                                            <div className="rounded-lg border border-blue-100 bg-white/70 p-3 mb-3">
                                                <div className="text-xs font-bold text-blue-700 mb-2">1. 발송 후보 시간 입력</div>
                                                <div className="text-xs text-blue-600">지원자가 카톡에서 링크를 눌러 선택할 시간 1~3개를 넣습니다.</div>
                                            </div>
                                            <div className="space-y-2">
                                                {scheduleDraft.slots.map((slot, idx) => (
                                                    <div key={slot.id} className="flex items-center gap-2">
                                                        <div className="w-16 text-xs font-bold text-blue-700">후보 {idx + 1}</div>
                                                        <input
                                                            type="datetime-local"
                                                            className="border border-blue-200 rounded p-2 text-sm w-full outline-none focus:ring-2 focus:ring-blue-500"
                                                            value={slot.datetime}
                                                            onChange={(e) => handleDraftSlotChange(slot.id, e.target.value)}
                                                        />
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex flex-wrap gap-2 mt-4">
                                                <button type="button" disabled={bookingActionBusy} onClick={() => persistScheduleRequest()} className="px-3 py-2 rounded-lg text-sm bg-white border border-blue-200 text-blue-700 hover:bg-blue-100 disabled:opacity-50">후보 저장</button>
                                                <button type="button" disabled={bookingActionBusy} onClick={copyBookingLink} className="px-3 py-2 rounded-lg text-sm bg-brand-600 text-white hover:bg-brand-700 disabled:opacity-50">예약 링크 생성/복사</button>
                                                <button type="button" disabled={bookingActionBusy} onClick={markBookingLinkSent} className="px-3 py-2 rounded-lg text-sm bg-slate-900 text-white hover:bg-slate-800 disabled:opacity-50">카카오 발송 처리</button>
                                            </div>
                                            <div className="mt-3 text-xs text-blue-700 bg-white/70 border border-blue-100 rounded-lg p-3 space-y-1">
                                                <div>현재 예약 링크 기준 URL: {getBookingBaseUrl()}</div>
                                                <div>로컬 파일 상태에서는 외부 공유가 안 되므로, 실제 카카오 발송 전에는 이 파일을 웹 URL로 배포해야 합니다.</div>
                                            </div>
                                        </div>

                                        <div className="bg-white border border-yellow-200 rounded-lg p-4 space-y-3">
                                            <div>
                                                <h4 className="font-bold text-slate-800">카카오 발송 템플릿 미리보기</h4>
                                                <p className="text-xs text-slate-500 mt-1">현재 후보 시간을 기준으로 만들어지는 기본 발송 문구입니다.</p>
                                            </div>
                                            <div className="whitespace-pre-wrap text-sm text-slate-700 bg-yellow-50 border border-yellow-100 rounded-lg p-4 leading-6">
                                                {buildInterviewRequestMessage({
                                                    candidateName: selectedCandidate.name,
                                                    companyName: templateSettings.companyName,
                                                    jobTitle: activeJob?.title,
                                                    slots: scheduleDraft.slots.filter((slot) => slot.datetime),
                                                    bookingUrl: buildBookingUrl({
                                                        jobId: activeJob?.id,
                                                        candidateId: selectedCandidate.id,
                                                        token: selectedCandidate.scheduleRequest?.token || scheduleDraft.token || 'preview-token'
                                                    }),
                                                    templateSettings
                                                })}
                                            </div>
                                            <div className="text-xs text-slate-500">
                                                실제 알림톡 연동 시에는 공급사 템플릿 코드와 치환변수에 맞춰 서버에서 최종 발송됩니다.
                                            </div>
                                        </div>

                                        {selectedCandidate.scheduleRequest?.token && (
                                            <div className="bg-white border border-slate-200 rounded-lg p-4 space-y-3">
                                                <h4 className="font-bold text-slate-800">예약 링크/응답 현황</h4>
                                                <div className="text-xs text-slate-500 break-all bg-slate-50 border rounded p-3">
                                                    {buildBookingUrl({
                                                        jobId: activeJob?.id,
                                                        candidateId: selectedCandidate.id,
                                                        token: selectedCandidate.scheduleRequest?.token
                                                    })}
                                                </div>
                                                <div className="grid grid-cols-2 gap-3 text-sm">
                                                    <div className="rounded-lg border border-slate-200 bg-slate-50 p-3">
                                                        <div className="text-xs text-slate-500 mb-1">발송 시각</div>
                                                        <div className="font-medium text-slate-800">{formatDateTimeLabel(selectedCandidate.scheduleRequest?.sentAt)}</div>
                                                    </div>
                                                    <div className="rounded-lg border border-slate-200 bg-slate-50 p-3">
                                                        <div className="text-xs text-slate-500 mb-1">지원자 응답</div>
                                                        <div className="font-medium text-slate-800">{formatDateTimeLabel(selectedCandidate.scheduleRequest?.respondedAt)}</div>
                                                    </div>
                                                </div>

                                                {getSelectedSlot(selectedCandidate) && (
                                                    <div className="rounded-lg border border-emerald-200 bg-emerald-50 p-4">
                                                        <div className="text-sm font-bold text-emerald-800 mb-1">지원자가 선택한 일정</div>
                                                        <div className="text-emerald-700">{formatDateTimeLabel(getSelectedSlot(selectedCandidate)?.datetime)}</div>
                                                        <div className="flex flex-wrap gap-2 mt-3">
                                                            <button type="button" disabled={bookingActionBusy || getScheduleRequestStatus(selectedCandidate) === 'confirmed'} onClick={confirmCandidateSchedule} className="px-3 py-2 rounded-lg text-sm bg-emerald-600 text-white hover:bg-emerald-700 disabled:opacity-50">선택 일정 확정</button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <div className="bg-gray-50 border border-gray-200 rounded-lg p-4">
                                            <h4 className="font-bold text-gray-800 mb-2">직접 확정 일정</h4>
                                            <input type="datetime-local" className="border border-gray-200 rounded p-2 text-sm w-full outline-none focus:ring-2 focus:ring-blue-500"
                                                value={selectedCandidate.interviewDate || ''}
                                                onChange={(e) => handleUpdateCandidateInterview(e.target.value)} />
                                            <p className="text-xs text-gray-500 mt-2">긴급 상황에서는 기존 방식처럼 면접 일정을 직접 확정할 수도 있습니다.</p>
                                        </div>
                                    </div>
                                )}

                                {/* 하단 액션 */}
                                {viewMode === 'detail' && activeJob && !isExpired(activeJob.period.end) && (
                                    <div className="grid grid-cols-3 gap-2 pt-4 border-t">
                                        {STAGES.map(s => <button key={s} onClick={async () => {
                                            if (!activeJob?.id || !selectedCandidate?.id) return;
                                            const updatedCandidates = await updateCandidatesAtomic(activeJob.id, (currentCandidates) =>
                                                currentCandidates.map(c => c.id === selectedCandidate.id ? {...c, status: s} : c)
                                            );
                                            if (updatedCandidates) {
                                                const latest = updatedCandidates.find(c => c.id === selectedCandidate.id);
                                                if (latest) setSelectedCandidate(latest);
                                            }
                                            setIsCandidateModalOpen(false);
                                        }} className={`border py-2 rounded text-xs hover:bg-gray-50 ${selectedCandidate.status === s ? 'bg-slate-800 text-white' : ''}`}>{s}</button>)}
                                    </div>
                                )}
                            </div>
                        )}
                    </Modal>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>

        const STAGES = ['접수', '서류검토', '1차면접', '2차면접', '최종합격', '불합격'];
        const CANDIDATE_SOURCES = ['사람인', '잡코리아', '추천', '링크드인', '홈페이지', '기타'];
        const DASHBOARD_RANGE_OPTIONS = [
            { id: 'all', label: '전체' },

            draft: '요청 전',
            ready: '요청 전',
            sent: '사람인 요청 완료',

            { id: 'sent', label: '발송완료' },

        ];
        const OFFER_LETTER_MANUAL_JOB_ID = 'offer_letter_manual_targets';

        const getOptionLabel = (options, id) => options.find((option) => option.id === id)?.label || id || '-';
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const getScheduleRequestStatus = (candidate) => candidate?.scheduleRequest?.status || 'draft';
        const isInterviewCandidate = (candidate) => String(candidate?.status || '').includes('면접');
        const getInterviewOpsState = (candidate) => {
            if (!isInterviewCandidate(candidate)) return 'none';
            if (candidate?.interviewDate) return 'confirmed';
            const requestStatus = getScheduleRequestStatus(candidate);
            if (requestStatus === 'sent' || requestStatus === 'responded') return 'requested';
            return 'requestNeeded';
        };
        const appendCandidateHistory = (candidate, message, at = new Date().toISOString()) => ({
            ...candidate,
            activityLog: [
                { id: generateId(), at, message },
                ...((candidate.activityLog || []).filter(Boolean))
            ].slice(0, 20)
        });
        const formatCandidateAddedAt = (candidate) => {
            if (!candidate) return '-';
            if (candidate.addedAt) return candidate.addedAt;
            if (candidate.addedAtIso) return new Date(candidate.addedAtIso).toLocaleDateString('ko-KR');
            return '-';
        };
        const formatDateTimeLabel = (value) => {
            if (!value) return '-';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return value;
            return d.toLocaleString('ko-KR', {
                year: 'numeric',
                month: 'numeric',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        };
        const getCandidateAddedDate = (candidate) => {
            if (!candidate) return null;
            if (Number.isFinite(candidate.addedAtTs)) return new Date(candidate.addedAtTs);
            const raw = candidate.addedAtIso || candidate.addedAt;
            const d = new Date(raw);
            if (!Number.isNaN(d.getTime())) return d;
            const match = String(raw || '').match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);
            if (!match) return null;
            return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
        };
        const isCandidateInRange = (candidate, range) => {
            if (range === 'all') return true;
            const added = getCandidateAddedDate(candidate);
            if (!added) return false;
            const start = new Date();
            start.setHours(0, 0, 0, 0);
            start.setDate(start.getDate() - (Number(range) - 1));
            return added >= start;
        };
        const percentLabel = (value, total, digits = 1) => {
            if (!total) return '0.0%';
            return `${((value / total) * 100).toFixed(digits)}%`;
        };
        const isFinalCandidate = (candidate) => ['최종합격', '불합격'].includes(candidate?.status);
        const isHiredCandidate = (candidate) => candidate?.status === '최종합격';
        const isOfferLetterTarget = (candidate) => isHiredCandidate(candidate) || !!candidate?.offerLetter?.manualTarget;
        const getOpsHistory = (candidate, field) => {
            const history = candidate?.[field]?.history;
            return Array.isArray(history) ? history.filter(Boolean) : [];
        };
        const findLatestOpsAt = (history, type) => history.find((item) => item?.type === type)?.at || '';
        const getOfferLetterState = (candidate) => {
            const offerLetter = candidate?.offerLetter || {};
            const history = getOpsHistory(candidate, 'offerLetter');
            const sentAt = offerLetter.sentAt || findLatestOpsAt(history, 'sent');
            const repliedAt = offerLetter.repliedAt || findLatestOpsAt(history, 'reply');
            const explicitStatus = ['pending', 'sent', 'replied'].includes(offerLetter.status) ? offerLetter.status : '';
            return {
                history,
                sentAt,
                repliedAt,
                status: explicitStatus || (repliedAt ? 'replied' : sentAt ? 'sent' : 'pending')
            };
        };
        const getOnboardingMailState = (candidate) => {
            const onboardingMail = candidate?.onboardingMail || {};
            const history = getOpsHistory(candidate, 'onboardingMail');
            const sentAt = onboardingMail.sentAt || findLatestOpsAt(history, 'sent');
            const receivedAt = onboardingMail.receivedAt || findLatestOpsAt(history, 'received');
            const explicitStatus = ['pending', 'sent', 'received'].includes(onboardingMail.status) ? onboardingMail.status : '';
            return {
                history,
                sentAt,
                receivedAt,
                status: explicitStatus || (receivedAt ? 'received' : sentAt ? 'sent' : 'pending')
            };
        };
        
        const getDday = (endDate) => {
            const today = new Date();
            const end = new Date(endDate);
            today.setHours(0,0,0,0);
            end.setHours(0,0,0,0);
            const diffTime = end - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays < 0) return '마감';
            if (diffDays === 0) return '오늘마감';
            return `D-${diffDays}`;
        };

        const isExpired = (endDate) => {
            const today = new Date();
            const end = new Date(endDate);
            today.setHours(0,0,0,0);
            end.setHours(0,0,0,0);
            return end < today;
        };
        const normalizePhone = (raw) => (raw || '').replace(/[^0-9]/g, '');
        const toDateOnly = (value) => {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '';
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        };
        const csvEscape = (value) => {
            const v = String(value ?? '');
            if (/[",\n]/.test(v)) return `"${v.replace(/"/g, '""')}"`;
            return v;
        };
        const escapeHtml = (value) => String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const Modal = ({ isOpen, onClose, title, children, size = 'md' }) => {
            if (!isOpen) return null;
            const sizeClass = size === 'lg' ? 'max-w-3xl' : 'max-w-lg';
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
                    <div className={`bg-white rounded-2xl shadow-2xl w-full ${sizeClass} overflow-hidden flex flex-col max-h-[90vh]`}>
                        <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                            <h3 className="font-bold text-lg text-gray-800">{title}</h3>
                            <button onClick={onClose} className="p-1 hover:bg-gray-200 rounded-full transition-colors"><Icons.X className="w-5 h-5 text-gray-500" /></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar">{children}</div>
                    </div>
                </div>
            );
        };
        const Badge = ({ children, colorClass }) => (<span className={`px-2 py-0.5 rounded text-xs font-semibold border ${colorClass}`}>{children}</span>);
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error('ErrorBoundary caught an error:', error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6">
                            <div className="max-w-lg w-full bg-white border border-red-100 rounded-2xl shadow-xl p-6">
                                <h2 className="text-xl font-bold text-red-600 mb-2">시스템 오류 발생</h2>
                                <p className="text-sm text-slate-600 mb-4">앱 실행 중 예외가 발생했습니다. 새로고침 후 다시 시도해주세요.</p>
                                <div className="text-xs text-slate-500 bg-slate-50 border rounded p-3 mb-4 break-all">
                                    {this.state.error?.message || '알 수 없는 오류'}
                                </div>
                                <button
                                    onClick={() => window.location.reload()}
                                    className="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-lg font-semibold"
                                >
                                    새로고침
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const App = () => {
            const [jobs, setJobs] = useState([]);
            const [fbReady, setFbReady] = useState(false);
            const [user, setUser] = useState(null);
            const [permissionError, setPermissionError] = useState(false);

            const [currentMenu, setCurrentMenu] = useState('dashboard'); 
            const [viewMode, setViewMode] = useState('list'); 
            const [activeJobId, setActiveJobId] = useState(null);
            
            const [isCreateOpen, setIsCreateOpen] = useState(false);
            const [isManualAddOpen, setIsManualAddOpen] = useState(false);
            const [isBulkUploadOpen, setIsBulkUploadOpen] = useState(false);
            const [bulkUploading, setBulkUploading] = useState(false);
            const [bulkUploadResult, setBulkUploadResult] = useState(null);
            const [editingJob, setEditingJob] = useState(null);
            const [isCandidateModalOpen, setIsCandidateModalOpen] = useState(false);
            const [selectedCandidate, setSelectedCandidate] = useState(null);

            useEffect(() => {
                const checkFirebase = () => {
                    if (window.fbServices && window.fbServices.ready) {
                        setFbReady(true);
                        const { onAuthStateChanged } = window.fbServices.api;
                        onAuthStateChanged(window.fbServices.auth, (u) => {
                           setUser(u);
                        });
                    }
                };
                if (window.fbServices && window.fbServices.ready) {
                    checkFirebase();
                } else {
                    window.addEventListener('firebase-ready', checkFirebase);
                }
                return () => window.removeEventListener('firebase-ready', checkFirebase);
            }, []);

            useEffect(() => {
                if (!user || !fbReady || !window.fbServices.db) return;
                const { onSnapshot } = window.fbServices.api;
                const colRef = window.fbServices.getCollectionPath(user.uid);
                
                const unsubscribe = onSnapshot(colRef, (snapshot) => {
                    const loadedJobs = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    setJobs(loadedJobs);
                    setPermissionError(false);
                }, (error) => {
                    if (error.code === 'permission-denied') setPermissionError(true);
                });
                return () => unsubscribe();
            }, [user, fbReady]);

            const firestoreWrite = async (jobId, data, isDelete = false) => {
                if (!user) return;
                const { setDoc, deleteDoc, doc } = window.fbServices.api;
                const colRef = window.fbServices.getCollectionPath(user.uid);
                const docRef = doc(colRef, jobId);
                try {
                    if (isDelete) await deleteDoc(docRef);
                    else await setDoc(docRef, data, { merge: true });
                } catch (e) {
                    if (e.code === 'permission-denied') alert("데이터 저장 권한 오류 (Test Mode 필요)");
                    else alert("저장 실패: " + e.message);
                }
            };
            const updateCandidatesAtomic = async (jobId, updater) => {
                if (!user || !jobId || typeof updater !== 'function') return null;
                const { runTransaction, doc } = window.fbServices.api;
                const colRef = window.fbServices.getCollectionPath(user.uid);
                const docRef = doc(colRef, jobId);
                try {
                    const updatedCandidates = await runTransaction(window.fbServices.db, async (tx) => {
                        const snap = await tx.get(docRef);
                        if (!snap.exists()) throw new Error('공고 문서를 찾을 수 없습니다.');
                        const jobData = snap.data() || {};
                        const currentCandidates = Array.isArray(jobData.candidates) ? jobData.candidates : [];
                        const nextCandidates = updater(currentCandidates);
                        tx.update(docRef, { candidates: nextCandidates });
                        return nextCandidates;
                    });
                    return updatedCandidates;
                } catch (e) {
                    console.error('지원자 동시 수정 실패:', e);
                    alert('지원자 업데이트 중 충돌이 발생했습니다. 다시 시도해주세요.');
                    return null;
                }
            };

            const activeJob = useMemo(() => jobs.find(j => j.id === activeJobId), [jobs, activeJobId]);
            const liveJobs = useMemo(() => jobs.filter(j => !j.deletedAt), [jobs]);
            const trashJobs = useMemo(() => jobs.filter(j => !!j.deletedAt), [jobs]);
            const activeJobs = useMemo(() => liveJobs.filter(j => !j.offerOnly && j.period?.end && !isExpired(j.period.end)), [liveJobs]);
            const closedJobs = useMemo(() => liveJobs.filter(j => !j.offerOnly && j.period?.end && isExpired(j.period.end)), [liveJobs]);
            const selectableJobs = useMemo(() => liveJobs.filter(j => !j.offerOnly), [liveJobs]);
            const hiredCandidateRecords = useMemo(() => {
                return liveJobs.flatMap((job) => (job.candidates || [])
                    .filter((candidate) => isHiredCandidate(candidate))
                    .map((candidate) => ({
                        candidate,
                        jobId: job.id,
                        jobTitle: job.offerOnly ? OFFER_LETTER_MANUAL_JOB_TITLE : (job.title || '-'),
                        team: job.offerOnly ? (candidate.offerLetter?.manualTeam || candidate.team || '부서 미지정') : (job.team || '미지정')
                    })))
                    .sort((a, b) => {
                        const aOffer = getOfferLetterState(a.candidate);
                        const bOffer = getOfferLetterState(b.candidate);
                        const aTime = new Date(aOffer.repliedAt || aOffer.sentAt || a.candidate.addedAtIso || 0).getTime() || 0;
                        const bTime = new Date(bOffer.repliedAt || bOffer.sentAt || b.candidate.addedAtIso || 0).getTime() || 0;
                        return bTime - aTime;
                    });
            }, [liveJobs]);
            const offerLetterCandidateRecords = useMemo(() => {
                return liveJobs.flatMap((job) => (job.candidates || [])
                    .filter((candidate) => isOfferLetterTarget(candidate))
                    .map((candidate) => ({
                        candidate,
                        jobId: job.id,
                        jobTitle: job.offerOnly ? OFFER_LETTER_MANUAL_JOB_TITLE : (job.title || '-'),
                        team: job.offerOnly ? (candidate.offerLetter?.manualTeam || candidate.team || '부서 미지정') : (job.team || '미지정')
                    })))
                    .sort((a, b) => {
                        const aOffer = getOfferLetterState(a.candidate);
                        const bOffer = getOfferLetterState(b.candidate);
                        const aTime = new Date(aOffer.repliedAt || aOffer.sentAt || a.candidate.offerLetter?.manualAddedAt || a.candidate.addedAtIso || 0).getTime() || 0;
                        const bTime = new Date(bOffer.repliedAt || bOffer.sentAt || b.candidate.offerLetter?.manualAddedAt || b.candidate.addedAtIso || 0).getTime() || 0;
                        return bTime - aTime;
                    });
            }, [liveJobs]);
            const onboardingCandidateRecords = useMemo(() => {
                return offerLetterCandidateRecords
                    .filter(({ candidate }) => getOfferLetterState(candidate).status === 'replied')
                    .sort((a, b) => {
                        const aMail = getOnboardingMailState(a.candidate);
                        const bMail = getOnboardingMailState(b.candidate);
                        const aOffer = getOfferLetterState(a.candidate);
                        const bOffer = getOfferLetterState(b.candidate);
                        const aTime = new Date(aMail.receivedAt || aMail.sentAt || aOffer.repliedAt || 0).getTime() || 0;
                        const bTime = new Date(bMail.receivedAt || bMail.sentAt || bOffer.repliedAt || 0).getTime() || 0;
                        return bTime - aTime;
                    });
            }, [offerLetterCandidateRecords]);
            const postHireStats = useMemo(() => {
                const total = hiredCandidateRecords.length;
                const offerTotal = offerLetterCandidateRecords.length;
                const offerPending = offerLetterCandidateRecords.filter(({ candidate }) => getOfferLetterState(candidate).status === 'pending').length;
                const offerSent = offerLetterCandidateRecords.filter(({ candidate }) => getOfferLetterState(candidate).status === 'sent').length;
                const offerReplied = offerLetterCandidateRecords.filter(({ candidate }) => getOfferLetterState(candidate).status === 'replied').length;
                const onboardingTotal = onboardingCandidateRecords.length;
                const onboardingPending = onboardingCandidateRecords.filter(({ candidate }) => getOnboardingMailState(candidate).status === 'pending').length;
                const onboardingSent = onboardingCandidateRecords.filter(({ candidate }) => getOnboardingMailState(candidate).status === 'sent').length;
                const onboardingReceived = onboardingCandidateRecords.filter(({ candidate }) => getOnboardingMailState(candidate).status === 'received').length;
                return {
                    total,
                    offerTotal,
                    offerPending,
                    offerSent,
                    offerReplied,
                    onboardingTotal,
                    onboardingPending,
                    onboardingSent,
                    onboardingReceived
                };
            }, [hiredCandidateRecords, offerLetterCandidateRecords, onboardingCandidateRecords]);
            const scheduleAlerts = useMemo(() => {
                const today = toDateOnly(new Date());
                const weekEnd = new Date();
                weekEnd.setDate(weekEnd.getDate() + 7);
                const withinWeekDeadlines = activeJobs
                    .filter(j => j.period?.end && new Date(j.period.end) <= weekEnd)
                    .sort((a, b) => (a.period?.end || '').localeCompare(b.period?.end || ''));
                const missingInterviewSchedule = [];
                const missingSaraminRequests = [];
                const pendingSaraminResponses = [];
                const todayInterviews = [];
                liveJobs.forEach((job) => {
                    (job.candidates || []).forEach((c) => {
                        if (isInterviewCandidate(c) && !c.interviewDate) {
                            const item = { jobTitle: job.title, name: c.name, status: c.status, requestedAt: c.scheduleRequest?.sentAt || '' };
                            missingInterviewSchedule.push(item);
                            if (getInterviewOpsState(c) === 'requestNeeded') {
                                missingSaraminRequests.push(item);
                            } else {
                                pendingSaraminResponses.push(item);
                            }
                        }
                        if (c.interviewDate && toDateOnly(c.interviewDate) === today) {
                            todayInterviews.push({ jobTitle: job.title, name: c.name, time: c.interviewDate });
                        }
                    });
                });
                return {
                    withinWeekDeadlines,
                    missingInterviewSchedule,
                    missingSaraminRequests,
                    pendingSaraminResponses,
                    todayInterviews
                };
            }, [activeJobs, liveJobs]);

            useEffect(() => {
                if (!user || trashJobs.length === 0) return;
                const THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;
                trashJobs.forEach((job) => {
                    if (job.deletedAt && Date.now() - job.deletedAt > THIRTY_DAYS) {
                        firestoreWrite(job.id, null, true);
                    }
                });
            }, [user, trashJobs]);

            const handleSaveJob = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const startDate = fd.get('startDate');
                const endDate = fd.get('endDate');
                if (startDate && endDate && new Date(startDate) > new Date(endDate)) {
                    alert('공고 시작일은 마감일보다 늦을 수 없습니다.');
                    return;
                }
                const jobData = {
                    title: fd.get('title'), team: fd.get('team'), status: '채용중',
                    meta: { type: fd.get('type'), level: fd.get('level'), salary: fd.get('salary'), location: fd.get('location') },
                    period: { start: startDate, end: endDate },
                    skills: fd.get('skills').split(',').map(s => s.trim()), description: fd.get('description'),
                };
                if (editingJob) {
                    await firestoreWrite(editingJob.id, { ...editingJob, ...jobData });
                    alert('공고가 수정되었습니다.');
                } else {
                    const newId = generateId();
                    await firestoreWrite(newId, { ...jobData, id: newId, candidates: [] });
                    alert('새로운 공고가 등록되었습니다.');
                }
                setIsCreateOpen(false); setEditingJob(null);
            };

            const handleManualAdd = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const email = String(fd.get('email') || '').trim().toLowerCase();
                const phone = normalizePhone(fd.get('phone'));
                const duplicate = liveJobs.find((job) =>
                    (job.candidates || []).some((c) => {
                        const emailSame = email && String(c.email || '').trim().toLowerCase() === email;
                        const phoneSame = phone && normalizePhone(c.phone) === phone;
                        return emailSame || phoneSame;
                    })
                );
                if (duplicate) {
                    alert(`중복 지원자 가능성이 있습니다.\n공고: ${duplicate.title}\n이메일/연락처를 확인해주세요.`);
                    return;
                }
                const now = new Date();
                const newCandidate = {
                    id: generateId(), 
                    name: fd.get('name') || '이름 없음', 
                    email: fd.get('email') || '',
                    phone: fd.get('phone') || '',
                    source: fd.get('source') || '기타',
                    address: fd.get('address') || '',
                    note: fd.get('note') || '',
                    status: '접수', 
                    addedAt: now.toLocaleDateString('ko-KR'),
                    addedAtIso: now.toISOString(),
                    addedAtTs: now.getTime(),
                    interviewDate: null
                };
                
                if (!activeJob?.id) return;
                await updateCandidatesAtomic(activeJob.id, (currentCandidates) => [...currentCandidates, newCandidate]);
                setIsManualAddOpen(false);
                alert('지원자가 등록되었습니다.');
            };
            const downloadCandidateTemplate = () => {
                const rows = [
                    ['이름', '이메일', '연락처', '지원경로', '주소', '비고'],
                    ['홍길동', 'sample@company.com', '010-1234-5678', '사람인', '서울시 강남구', '포트폴리오 우수']
                ];
                const csv = rows.map((r) => r.map(csvEscape).join(',')).join('\n');
                const bom = '\uFEFF';
                const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '지원자_대량업로드_양식.csv';
                a.click();
                URL.revokeObjectURL(url);
            };
            const parseCsvRows = (text) => {
                const lines = String(text || '').replace(/\r/g, '').split('\n').filter((line) => line.trim() !== '');
                if (lines.length < 2) return [];
                const parseLine = (line) => {
                    const result = [];
                    let current = '';
                    let inQuotes = false;
                    for (let i = 0; i < line.length; i += 1) {
                        const ch = line[i];
                        const next = line[i + 1];
                        if (ch === '"' && inQuotes && next === '"') {
                            current += '"';
                            i += 1;
                        } else if (ch === '"') {
                            inQuotes = !inQuotes;
                        } else if (ch === ',' && !inQuotes) {
                            result.push(current.trim());
                            current = '';
                        } else {
                            current += ch;
                        }
                    }
                    result.push(current.trim());
                    return result;
                };
                const header = parseLine(lines[0]).map((h) => h.trim());
                return lines.slice(1).map((line) => {
                    const cols = parseLine(line);
                    const row = {};
                    header.forEach((key, idx) => { row[key] = cols[idx] || ''; });
                    return row;
                });
            };
            const mapCandidateRow = (raw) => {
                const name = String(raw['이름'] || raw['성명'] || raw['name'] || '').trim();
                const email = String(raw['이메일'] || raw['email'] || '').trim();
                const phone = String(raw['연락처'] || raw['전화번호'] || raw['phone'] || '').trim();
                const source = String(raw['지원경로'] || raw['채널'] || raw['source'] || raw['channel'] || '').trim();
                const address = String(raw['주소'] || raw['주소지'] || raw['address'] || '').trim();
                const note = String(raw['비고'] || raw['메모'] || raw['note'] || '').trim();
                return { name, email, phone, source, address, note };
            };
            const handleBulkUploadFile = async (file) => {
                if (!file) return;
                if (!activeJob?.id) {
                    alert('대상 공고를 먼저 선택해주세요.');
                    return;
                }
                setBulkUploading(true);
                setBulkUploadResult(null);
                try {
                    let rows = [];
                    const fileName = String(file.name || '').toLowerCase();
                    if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
                        if (!window.XLSX) throw new Error('엑셀 파서 로드 실패');
                        const buffer = await file.arrayBuffer();
                        const workbook = window.XLSX.read(new Uint8Array(buffer), { type: 'array' });
                        const firstSheet = workbook.SheetNames[0];
                        rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet], { defval: '' });
                    } else {
                        const text = await file.text();
                        rows = parseCsvRows(text);
                    }
                    if (!rows.length) {
                        alert('업로드할 데이터가 없습니다.');
                        setBulkUploading(false);
                        return;
                    }
                    const mapped = rows.map(mapCandidateRow);
                    const duplicatesInSystem = [];
                    const duplicatesInFile = [];
                    const invalidRows = [];
                    const validCandidates = [];
                    const existingIndex = new Set();
                    liveJobs.forEach((job) => {
                        (job.candidates || []).forEach((c) => {
                            const e = String(c.email || '').trim().toLowerCase();
                            const p = normalizePhone(c.phone);
                            if (e) existingIndex.add(`e:${e}`);
                            if (p) existingIndex.add(`p:${p}`);
                        });
                    });
                    const fileIndex = new Set();
                    mapped.forEach((row, i) => {
                        const rowNum = i + 2;
                        const name = row.name;
                        const email = String(row.email || '').toLowerCase();
                        const phone = normalizePhone(row.phone);
                        if (!name) {
                            invalidRows.push(`행 ${rowNum}: 이름 누락`);
                            return;
                        }
                        if (!email && !phone) {
                            invalidRows.push(`행 ${rowNum}: 이메일/연락처 중 1개 이상 필요`);
                            return;
                        }
                        const fileEmailKey = email ? `e:${email}` : '';
                        const filePhoneKey = phone ? `p:${phone}` : '';
                        if ((fileEmailKey && fileIndex.has(fileEmailKey)) || (filePhoneKey && fileIndex.has(filePhoneKey))) {
                            duplicatesInFile.push(`행 ${rowNum}: 파일 내 중복`);
                            return;
                        }
                        if ((fileEmailKey && existingIndex.has(fileEmailKey)) || (filePhoneKey && existingIndex.has(filePhoneKey))) {
                            duplicatesInSystem.push(`행 ${rowNum}: 기존 데이터 중복`);
                            return;
                        }
                        if (fileEmailKey) fileIndex.add(fileEmailKey);
                        if (filePhoneKey) fileIndex.add(filePhoneKey);
                        const now = new Date();
                        validCandidates.push({
                            id: generateId(),
                            name,
                            email: row.email || '',
                            phone: row.phone || '',
                            source: row.source || '기타',
                            address: row.address || '',
                            note: row.note || '',
                            status: '접수',
                            addedAt: now.toLocaleDateString('ko-KR'),
                            addedAtIso: now.toISOString(),
                            addedAtTs: now.getTime(),
                            interviewDate: null
                        });
                    });
                    if (!validCandidates.length) {
                        setBulkUploadResult({
                            total: rows.length,
                            success: 0,
                            failed: invalidRows.length + duplicatesInSystem.length + duplicatesInFile.length,
                            invalidRows,
                            duplicatesInSystem,
                            duplicatesInFile
                        });
                        return;
                    }
                    await updateCandidatesAtomic(activeJob.id, (currentCandidates) => [...currentCandidates, ...validCandidates]);
                    setBulkUploadResult({
                        total: rows.length,
                        success: validCandidates.length,
                        failed: invalidRows.length + duplicatesInSystem.length + duplicatesInFile.length,
                        invalidRows,
                        duplicatesInSystem,
                        duplicatesInFile
                    });
                } catch (err) {
                    console.error('대량 업로드 실패:', err);
                    alert(`대량 업로드 실패: ${err.message || err}`);
                } finally {
                    setBulkUploading(false);
                }
            };

            const handleUpdateCandidateInterview = async (date) => {
                if (!activeJob?.id || !selectedCandidate?.id) return;
                const nowIso = new Date().toISOString();
                const updatedCandidates = await updateCandidatesAtomic(activeJob.id, (currentCandidates) =>
                    currentCandidates.map(c => {
                        if (c.id !== selectedCandidate.id) return c;
                        const nextCandidate = {
                            ...c,
                            interviewDate: date || null,
                            scheduleRequest: {
                                ...(c.scheduleRequest || {}),
                                status: date ? 'confirmed' : (c.scheduleRequest?.status || 'draft'),
                                confirmedAt: date ? nowIso : ''
                            }
                        };
                        return appendCandidateHistory(nextCandidate, date ? `면접 일정 확정: ${formatDateTimeLabel(date)}` : '면접 일정 삭제', nowIso);
                    })
                );
                if (updatedCandidates) {
                    const latest = updatedCandidates.find(c => c.id === selectedCandidate.id);
                    if (latest) setSelectedCandidate(latest);
                }
            };
            const handleMarkSaraminRequestSent = async () => {
                if (!activeJob?.id || !selectedCandidate?.id) return;
                const nowIso = new Date().toISOString();
                const updatedCandidates = await updateCandidatesAtomic(activeJob.id, (currentCandidates) =>
                    currentCandidates.map(c => {
                        if (c.id !== selectedCandidate.id) return c;
                        const nextCandidate = {
                            ...c,
                            scheduleRequest: {
                                ...(c.scheduleRequest || {}),
                                status: c.interviewDate ? 'confirmed' : 'sent',
                                sentAt: c.scheduleRequest?.sentAt || nowIso
                            }
                        };
                        return appendCandidateHistory(nextCandidate, '사람인 면접일자 요청 완료 기록', nowIso);
                    })
                );
                if (updatedCandidates) {
                    const latest = updatedCandidates.find(c => c.id === selectedCandidate.id);
                    if (latest) setSelectedCandidate(latest);
                    alert('사람인 면접일자 요청 완료로 기록했습니다.');
                }
            };
            const updatePostHireCandidateRecord = async (jobId, candidateId, updater) => {
                if (!jobId || !candidateId || typeof updater !== 'function') return null;
                const updatedCandidates = await updateCandidatesAtomic(jobId, (currentCandidates) =>
                    currentCandidates.map((candidate) => candidate.id === candidateId ? updater(candidate) : candidate)
                );
                if (updatedCandidates && selectedCandidate?.id === candidateId) {
                    const latest = updatedCandidates.find((candidate) => candidate.id === candidateId);
                    if (latest) setSelectedCandidate(latest);
                }
                return updatedCandidates;
            };
            const handleRecordOfferSent = async (record) => {
                if (!record?.jobId || !record?.candidate?.id) return;

                const stageTotal = stageCounts.reduce((sum, s) => sum + s.count, 0);
                const riskTotal = riskStats.reduce((sum, r) => sum + r.count, 0);
                const stageDonut = buildDonutSvg(stageCounts, (_, i) => stagePalette[i % stagePalette.length], `${stageTotal}`);
                const riskDonut = buildDonutSvg(riskStats, (_, i) => riskPalette[i % riskPalette.length], `${riskTotal}`);
                const riskItems = [
                    ...scheduleAlerts.todayInterviews.map((x) => ({ type: '오늘 면접', job: x.jobTitle || '-', who: x.name || '-', when: x.time || '-' })),
                    ...scheduleAlerts.missingSaraminRequests.map((x) => ({ type: '사람인 요청 전', job: x.jobTitle || '-', who: x.name || '-', when: x.status || '-' })),
                    ...scheduleAlerts.missingInterviewSchedule.map((x) => ({ type: '확정 일정 없음', job: x.jobTitle || '-', who: x.name || '-', when: x.status || '-' })),

                ].slice(0, 5);
                const focusJobs = [...activeJobs]
                    .sort((a, b) => ((b.candidates || []).length - (a.candidates || []).length))
                    .slice(0, 8)
                    .map((j) => {
                        const cands = j.candidates || [];
                        const interview = cands.filter((c) => String(c.status).includes('면접')).length;
                        const hired = cands.filter((c) => c.status === '최종합격').length;
                        return {

                const actions = [
                    { label: '오늘 면접 진행 준비', value: `${scheduleAlerts.todayInterviews.length}건` },
                    { label: '사람인 면접일자 요청 등록', value: `${scheduleAlerts.missingSaraminRequests.length}건` },
                    { label: '사람인 응답 확인 후 일정 확정', value: `${scheduleAlerts.pendingSaraminResponses.length}건` },
                    { label: '7일 내 마감 공고 우선 검토', value: `${scheduleAlerts.withinWeekDeadlines.length}건` }
                ];

                const win = window.open('', '_blank', 'width=1100,height=780');
                if (!win) return alert('팝업이 차단되어 인쇄 창을 열 수 없습니다.');
                const html = `
                    <html><head><meta charset="utf-8"><title>경영진 1페이지 보고서</title>
                    <style>
                        @page { size: A4 portrait; margin: 8mm; }

                        body{font-family:Pretendard,Apple SD Gothic Neo,sans-serif;margin:0;color:#0f172a;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
                        .sheet{width:100%;min-height:277mm;padding:3mm;}
                        h1{margin:0 0 2px 0;font-size:24px;} .sub{color:#64748b;margin-bottom:10px;font-size:12px;}
                        .kpi{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:8px 0 10px 0;}
                        .card{border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px;}
                        .label{font-size:11px;color:#64748b;margin-bottom:4px;} .value{font-size:20px;font-weight:800;line-height:1.1;}
                        .row{display:grid;grid-template-columns:1fr;gap:8px;}
                        .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
                        .row3{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px;}
                        table{width:100%;border-collapse:collapse;font-size:11px;}
                        th,td{border:1px solid #e2e8f0;padding:6px;text-align:left;} th{background:#f8fafc;}
                        h3{margin:0 0 6px 0;font-size:14px;}
                        .chart{border:1px solid #e2e8f0;border-radius:10px;padding:8px 10px;}
                        .chart-wrap{display:flex;align-items:center;gap:10px;}
                        .legend{flex:1;}
                        .legend-item{display:grid;grid-template-columns:14px 1fr 44px;align-items:center;gap:7px;margin:4px 0;font-size:11px;}
                        .dot{width:10px;height:10px;border-radius:999px;display:inline-block;}
                    </style></head><body><div class="sheet">
                    <h1>채용 경영진 1페이지 보고서</h1>
                    <div class="sub">기준시점: ${new Date().toLocaleString('ko-KR')}</div>
                    <div class="kpi">
                        <div class="card"><div class="label">진행중 공고</div><div class="value">${totals.activeJobs}</div></div>
                        <div class="card"><div class="label">전체 지원자</div><div class="value">${totals.totalCandidates}</div></div>
                        <div class="card"><div class="label">합격자</div><div class="value">${totals.hired}</div></div>
                        <div class="card"><div class="label">합격률</div><div class="value">${hireRate}%</div></div>
                        <div class="card"><div class="label">면접 진행중</div><div class="value">${totals.inInterview}</div></div>
                    </div>
                    <div class="row">
                        <div>
                            <h3>Top Risk 5</h3>
                            <table>
                                <thead><tr><th>유형</th><th>공고</th><th>대상</th><th>일정/상태</th></tr></thead>
                                <tbody>
                                    ${riskItems.map((r) => `<tr><td>${escapeHtml(r.type)}</td><td>${escapeHtml(r.job)}</td><td>${escapeHtml(r.who)}</td><td>${escapeHtml(r.when)}</td></tr>`).join('') || '<tr><td colspan="4">리스크 없음</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                        <div>
                            <h3>이번주 액션 3</h3>
                            <table>
                                <thead><tr><th>액션</th><th>건수</th></tr></thead>
                                <tbody>
                                    ${actions.map((a) => `<tr><td>${escapeHtml(a.label)}</td><td>${escapeHtml(a.value)}</td></tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="row2">
                        <div class="chart">
                            <h3>파이프라인 단계별 분포</h3>
                            <div class="chart-wrap">
                                ${stageDonut}
                                <div class="legend">
                                    ${stageCounts.map((s, i) => `<div class="legend-item"><span class="dot" style="background:${stagePalette[i % stagePalette.length]}"></span><span>${escapeHtml(s.stage)}</span><span style="text-align:right">${s.count}</span></div>`).join('')}
                                </div>
                            </div>
                        </div>
                        <div class="chart">
                            <h3>핵심 리스크 분포</h3>
                            <div class="chart-wrap">
                                ${riskDonut}
                                <div class="legend">
                                    ${riskStats.map((r, i) => `<div class="legend-item"><span class="dot" style="background:${riskPalette[i % riskPalette.length]}"></span><span>${escapeHtml(r.label)}</span><span style="text-align:right">${r.count}</span></div>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row3">
                        <div class="chart">
                            <h3>핵심 공고 포커스 (지원자 많은 순)</h3>
                            <table>
                                <thead><tr><th>공고</th><th>부서</th><th>기간</th><th>지원자</th><th>면접중</th><th>합격</th></tr></thead>
                                <tbody>
                                    ${focusJobs.map((j) => `<tr><td>${escapeHtml(j.title)}</td><td>${escapeHtml(j.team)}</td><td>${escapeHtml(j.period)}</td><td>${j.total}</td><td>${j.interview}</td><td>${j.hired}</td></tr>`).join('') || '<tr><td colspan="6">데이터 없음</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    </div></body></html>`;
                win.document.open();
                win.document.write(html);
                win.document.close();
                win.focus();
                win.print();
            };

            const handleEarlyClose = async (jobId) => {
                if(window.confirm('이 공고를 조기 마감하시겠습니까?\n마감일이 어제로 설정되어 "마감된 공고"로 이동됩니다.')) {
                    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                    const formattedDate = yesterday.toISOString().split('T')[0];
                    const jobToUpdate = jobs.find(j => j.id === jobId);
                    if(jobToUpdate) {
                        await firestoreWrite(jobId, { ...jobToUpdate, period: { ...jobToUpdate.period, end: formattedDate } });
                        alert('공고가 조기 마감되었습니다.');
                        if(activeJobId === jobId) { setViewMode('list'); setActiveJobId(null); }
                    }
                }
            };

            const handleDeleteCandidate = async (candidateId, e) => {
                e.stopPropagation();
                if (window.confirm('이 지원자를 정말 삭제하시겠습니까?')) {
                    if (!activeJob?.id) return;
                    await updateCandidatesAtomic(activeJob.id, (currentCandidates) =>
                        currentCandidates.filter(c => c.id !== candidateId)
                    );
                    if (selectedCandidate && selectedCandidate.id === candidateId) {
                        setIsCandidateModalOpen(false); setSelectedCandidate(null);
                    }
                }
            };

            const openCreateModal = () => { setEditingJob(null); setIsCreateOpen(true); };
            const openEditModal = (job, e) => { e.stopPropagation(); setEditingJob(job); setIsCreateOpen(true); };

            const moveCandidate = async (candidateId, direction) => {
                if (!activeJob?.id) return;
                const nowIso = new Date().toISOString();
                await updateCandidatesAtomic(activeJob.id, (currentCandidates) =>
                    currentCandidates.map(c => {
                        if (c.id !== candidateId) return c;
                        const nextIndex = STAGES.indexOf(c.status) + direction;
                        if (nextIndex < 0 || nextIndex >= STAGES.length) return c;
                        const nextStatus = STAGES[nextIndex];
                        return appendCandidateHistory({ ...c, status: nextStatus }, `단계 변경: ${c.status} → ${nextStatus}`, nowIso);
                    })
                );
            };

            const CalendarView = () => {
                const [currentDate, setCurrentDate] = useState(new Date());
                const events = useMemo(() => {
                    const all = [];
                    liveJobs.forEach(job => { (job.candidates || []).forEach(c => { if (c.interviewDate) all.push({ ...c, jobTitle: job.title, jobId: job.id }); }); });
                    return all;
                }, [liveJobs]);
                const getDaysInMonth = (date) => {
                    const year = date.getFullYear(); const month = date.getMonth();
                    return { days: new Date(year, month + 1, 0).getDate(), firstDay: new Date(year, month, 1).getDay() };
                };
                const { days, firstDay } = getDaysInMonth(currentDate);
                const totalCells = Math.ceil((firstDay + days) / 7) * 7;
                const weekCount = totalCells / 7;
                const calendarCells = Array.from({ length: totalCells }, (_, index) => {
                    const day = index - firstDay + 1;
                    return day >= 1 && day <= days ? day : null;
                });
                const monthName = currentDate.toLocaleString('ko-KR', { year: 'numeric', month: 'long' });
                const handlePrevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
                const handleNextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
                const handleCandidateClick = (candidate) => { setActiveJobId(candidate.jobId); setSelectedCandidate(candidate); setIsCandidateModalOpen(true); };

                return (
                    <div className="p-8 h-full flex flex-col animate-fade-in-up">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2"><Icons.Calendar className="w-6 h-6 text-brand-600" /> 면접 일정 캘린더</h2>
                            <div className="flex items-center gap-4">
                                <button onClick={handlePrevMonth} className="p-2 hover:bg-gray-100 rounded-full"><Icons.ChevronLeft className="w-5 h-5" /></button>
                                <span className="text-xl font-bold text-gray-700">{monthName}</span>
                                <button onClick={handleNextMonth} className="p-2 hover:bg-gray-100 rounded-full"><Icons.ChevronRight className="w-5 h-5" /></button>
                            </div>
                        </div>
                        <div className="flex-1 min-h-0 bg-white rounded-2xl border border-gray-200 shadow-sm flex flex-col overflow-hidden">
                            <div className="grid grid-cols-7 border-b border-gray-200 bg-gray-50">
                                {['일', '월', '화', '수', '목', '금', '토'].map((d, i) => (<div key={d} className={`py-3 text-center text-sm font-bold ${i === 0 ? 'text-red-500' : 'text-gray-600'}`}>{d}</div>))}
                            </div>
                            <div
                                className="calendar-month-grid grid grid-cols-7 flex-1"
                                style={{ gridTemplateRows: `repeat(${weekCount}, minmax(0, 1fr))` }}
                            >
                                {calendarCells.map((day, i) => {
                                    if (!day) {
                                        return <div key={`empty-${i}`} className="border-b border-r border-gray-100 bg-gray-50/30"></div>;
                                    }
                                    const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                                    const dayEvents = events.filter(e => e.interviewDate.startsWith(dateStr)).sort((a,b) => a.interviewDate.localeCompare(b.interviewDate));
                                    const isToday = new Date().toDateString() === new Date(currentDate.getFullYear(), currentDate.getMonth(), day).toDateString();
                                    return (
                                        <div key={day} className={`calendar-day-cell border-b border-r border-gray-100 p-2 relative hover:bg-gray-50 transition-colors ${isToday ? 'bg-blue-50/50' : ''}`}>
                                            <div className={`shrink-0 text-sm font-medium mb-1 ${isToday ? 'text-brand-600 font-bold' : 'text-gray-700'}`}>{day}</div>
                                            <div className="calendar-day-events custom-scrollbar space-y-1 flex-1">
                                                {dayEvents.map((ev, idx) => {
                                                    const eventTime = (ev.interviewDate.split('T')[1] || '').slice(0, 5);
                                                    return (
                                                        <button key={idx} onClick={() => handleCandidateClick(ev)} title={`${eventTime} ${ev.name} - ${ev.jobTitle}`} className="calendar-event-card w-full text-left bg-white border border-brand-100 rounded px-1.5 py-0.5 text-xs shadow-sm hover:shadow-md hover:border-brand-300 transition-all flex flex-col justify-center group">
                                                            <div className="flex justify-between items-center gap-1 min-w-0 leading-4">
                                                                <span className="font-bold text-brand-700 shrink-0">{eventTime}</span>
                                                                <span className={`text-[10px] px-1 rounded shrink-0 ${ev.status === '1차면접' ? 'bg-orange-100 text-orange-700' : 'bg-purple-100 text-purple-700'}`}>{ev.status}</span>
                                                            </div>
                                                            <div className="flex items-center gap-1 min-w-0 leading-4">
                                                                <span className="truncate text-gray-700 font-medium">{ev.name}</span>
                                                                <span className="text-gray-300 shrink-0">·</span>
                                                                <span className="truncate text-gray-400 text-[10px]">{ev.jobTitle}</span>
                                                            </div>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            const AdvancedDashboard = () => {
                const [dashboardRange, setDashboardRange] = useState('30');
                const totalActive = activeJobs.length;
                const allCandidateRecords = useMemo(() => {
                    return liveJobs.flatMap((job) => (job.candidates || []).map((candidate) => ({
                        candidate,
                        jobId: job.id,
                        jobTitle: job.title || '-',
                        team: job.team || '미지정',
                        period: job.period || {},
                        source: candidate.source || '미기록'
                    })));
                }, [liveJobs]);
                const scopedCandidateRecords = useMemo(() => {
                    return allCandidateRecords.filter(({ candidate }) => isCandidateInRange(candidate, dashboardRange));
                }, [allCandidateRecords, dashboardRange]);
                const totalCandidates = allCandidateRecords.length;
                const scopedTotal = scopedCandidateRecords.length;
                const scopedInterviewed = scopedCandidateRecords.filter(({ candidate }) => isInterviewCandidate(candidate) || candidate.status === '최종합격').length;
                const scopedHired = scopedCandidateRecords.filter(({ candidate }) => candidate.status === '최종합격').length;
                const scopedRejected = scopedCandidateRecords.filter(({ candidate }) => candidate.status === '불합격').length;
                const scopedActiveCandidates = scopedCandidateRecords.filter(({ candidate }) => !isFinalCandidate(candidate)).length;
                const averagePerActiveJob = totalActive > 0 ? (scopedTotal / totalActive).toFixed(1) : '0.0';
                const skillCounts = useMemo(() => {
                    const counts = {};
                    liveJobs.forEach(job => (job.skills || []).forEach(skill => counts[skill] = (counts[skill] || 0) + 1));
                    return Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 5);
                }, [liveJobs]);
                const recentActivities = useMemo(() => {
                    return [...allCandidateRecords]
                        .sort((a, b) => {
                            const aTime = getCandidateAddedDate(a.candidate)?.getTime() || 0;
                            const bTime = getCandidateAddedDate(b.candidate)?.getTime() || 0;
                            return bTime - aTime;
                        })
                        .slice(0, 5);
                }, [allCandidateRecords]);
                const departmentStats = useMemo(() => {
                    const depts = {};
                    activeJobs.forEach((job) => {
                        const count = (job.candidates || []).filter((candidate) => isCandidateInRange(candidate, dashboardRange)).length;
                        depts[job.team || '미지정'] = (depts[job.team || '미지정'] || 0) + count;
                    });
                    const entries = Object.entries(depts).sort((a,b) => b[1] - a[1]).slice(0, 5);
                    const max = Math.max(...entries.map(([, count]) => count), 1);
                    return entries.map(([name, count]) => ({ name, count, rate: (count / max) * 100 }));
                }, [activeJobs, dashboardRange]);
                const stageStats = useMemo(() => {
                    const stats = STAGES.map((stage) => ({
                        stage,
                        count: scopedCandidateRecords.filter(({ candidate }) => candidate.status === stage).length
                    }));
                    const max = Math.max(...stats.map((item) => item.count), 1);
                    return stats.map((item) => ({
                        ...item,
                        height: Math.max((item.count / max) * 100, item.count > 0 ? 10 : 4),
                        rate: percentLabel(item.count, scopedTotal)
                    }));
                }, [scopedCandidateRecords, scopedTotal]);
                const sourceStats = useMemo(() => {
                    const map = {};
                    scopedCandidateRecords.forEach(({ candidate, source }) => {
                        if (!map[source]) map[source] = { source, count: 0, interviewed: 0, hired: 0, active: 0 };
                        map[source].count += 1;
                        if (isInterviewCandidate(candidate) || candidate.status === '최종합격') map[source].interviewed += 1;
                        if (candidate.status === '최종합격') map[source].hired += 1;
                        if (!isFinalCandidate(candidate)) map[source].active += 1;
                    });
                    return Object.values(map)
                        .sort((a, b) => b.count - a.count)
                        .map((item) => ({
                            ...item,
                            interviewRate: percentLabel(item.interviewed, item.count),
                            hireRate: percentLabel(item.hired, item.count)
                        }));
                }, [scopedCandidateRecords]);
                const jobPerformance = useMemo(() => {
                    return activeJobs.map((job) => {
                        const candidates = (job.candidates || []).filter((candidate) => isCandidateInRange(candidate, dashboardRange));
                        const total = candidates.length;
                        const interviewed = candidates.filter((candidate) => isInterviewCandidate(candidate) || candidate.status === '최종합격').length;
                        const hired = candidates.filter((candidate) => candidate.status === '최종합격').length;
                        const rejected = candidates.filter((candidate) => candidate.status === '불합격').length;
                        const missingSchedule = candidates.filter((candidate) => isInterviewCandidate(candidate) && !candidate.interviewDate).length;
                        const dday = job.period?.end ? getDday(job.period.end) : '';
                        const closingSoon = dday === '오늘마감' || (dday.startsWith('D-') && Number(dday.replace('D-', '')) <= 7);
                        return {
                            id: job.id,
                            title: job.title || '-',
                            team: job.team || '미지정',
                            total,
                            interviewed,
                            hired,
                            rejected,
                            missingSchedule,
                            riskScore: missingSchedule + (closingSoon ? 1 : 0),
                            interviewRate: percentLabel(interviewed, total),
                            hireRate: percentLabel(hired, total)
                        };
                    }).sort((a, b) => (b.riskScore - a.riskScore) || (b.total - a.total)).slice(0, 6);
                }, [activeJobs, dashboardRange]);
                const weeklyTrend = useMemo(() => {
                    const today = new Date();
                    today.setHours(23, 59, 59, 999);
                    return Array.from({ length: 8 }).map((_, idx) => {
                        const start = new Date(today);
                        start.setDate(today.getDate() - ((7 - idx) * 7));
                        start.setHours(0, 0, 0, 0);
                        const end = new Date(start);
                        end.setDate(start.getDate() + 6);
                        end.setHours(23, 59, 59, 999);
                        const count = allCandidateRecords.filter(({ candidate }) => {
                            const added = getCandidateAddedDate(candidate);
                            return added && added >= start && added <= end;
                        }).length;
                        return { label: `${start.getMonth() + 1}/${start.getDate()}`, count };
                    });
                }, [allCandidateRecords]);
                const maxTrendCount = Math.max(...weeklyTrend.map((item) => item.count), 1);
                const topSource = sourceStats[0]?.source || '-';
                const kpis = [
                    { title: '진행중 공고', value: totalActive, unit: '건', sub: `공고당 평균 ${averagePerActiveJob}명`, icon: Icons.Briefcase, box: 'bg-blue-50 text-blue-600' },
                    { title: '분석 대상 지원자', value: scopedTotal, unit: '명', sub: `전체 누적 ${totalCandidates}명`, icon: Icons.Users, box: 'bg-indigo-50 text-indigo-600' },
                    { title: '면접 전환율', value: percentLabel(scopedInterviewed, scopedTotal), unit: '', sub: `면접/합격 ${scopedInterviewed}명`, icon: Icons.Activity, box: 'bg-orange-50 text-orange-600' },
                    { title: '합격률', value: percentLabel(scopedHired, scopedTotal), unit: '', sub: `합격 ${scopedHired}명 · 불합격 ${scopedRejected}명`, icon: Icons.TrendingUp, box: 'bg-emerald-50 text-emerald-600' }
                ];

            const OfferLetterView = () => {

                const filteredManualAddOptions = useMemo(() => {
                    const q = manualAddQuery.trim().toLowerCase();
                    return manualAddOptions.filter((record) => {
                        const candidate = record.candidate;
                        const haystack = [
                            candidate.name,
                            candidate.email,
                            candidate.phone,
                            candidate.status,
                            record.jobTitle,
                            record.team
                        ].join(' ').toLowerCase();
                        return !q || haystack.includes(q);
                    }).slice(0, 50);
                }, [manualAddOptions, manualAddQuery]);
                const filteredRecords = useMemo(() => {
                    const q = query.trim().toLowerCase();
                    return offerLetterCandidateRecords.filter((record) => {

                            candidate.name,
                            candidate.email,

                            record.jobTitle,
                            record.team,

                            (statusFilter === 'sent' && offerState.status === 'sent') ||
